                            </otm2:panel>
                            <otm2:panel name="panelEstagioSitucaoAproveitamento_#{estagioItens.codigo}" styleClassFooter="dn" styleClassHeader="" rendered="#{estagioItens.situacaoEstagioEnum eq 'EM_CORRECAO' or estagioItens.situacaoEstagioEnum eq 'INDEFERIDO'}">
                                <ui:define name="header">
                                    <h:outputText value="Motivo - #{estagioItens.situacaoEstagioEnum.isEmCorrecao() ? 'Correção' : 'Indeferimento'}"/>
                                </ui:define>
                                <ui:define name="body">
                                    <h:panelGroup layout="block" styleClass="col-md-12" rendered="#{estagioItens.situacaoEstagioEnum eq 'INDEFERIDO'}">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="Motivo Indeferimento: "/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.motivoIndeferimento}"/>
                                    </h:panelGroup>
                                    <h:panelGroup layout="block" styleClass="col-md-12" rendered="#{estagioItens.situacaoEstagioEnum eq 'EM_CORRECAO'}">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="Motivo Correção: "/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.motivoCorrecao}"/>
                                    </h:panelGroup>
                                </ui:define>
                            </otm2:panel>
                            <otm2:panel name="panelAproveitamentoQuestionario_#{estagioItens.codigo}" styleClassFooter="dn" styleClassHeader="">
                                <ui:define name="header">
                                    <h:outputText value="Questionário"/>
                                </ui:define>
                                <ui:define name="body">
                                    <h:panelGroup layout="block" styleClass="col-md-12">
                                    	<otm2:questionarioResposta permiteDeletarArquivo="true" id="questionarioAproveitamento_#{row}" bean="#{EstagioControle}" objetoOrigem="#{estagioItens.questionarioAproveitamento}"/>
                                    </h:panelGroup>
                                </ui:define>
                                <ui:define name="footer"></ui:define>
                            </otm2:panel>
                        </ui:define>
                        <ui:define name="footer">
                            <h:panelGroup styleClass="col-md-12 d-flex justify-content-center mt20">
                                <otm:commandButton action="#{EstagioControle.corrigirAproveitamento}" value="Corrigir Aproveitamento" accesskey="1" update="panelAproveitamento_#{estagioItens.codigo}, form" rendered="#{estagioItens.situacaoEstagioEnum eq 'EM_CORRECAO'}" icon="#{msg_botoes.btn_icon_solicitarCorrecao_embutido}" styleClass="btn btn-primary"/>
                            </h:panelGroup>
                        </ui:define>
                    </otm2:panel>
                </h:panelGroup>
                <h:panelGroup rendered="#{estagioItens.modalidadeEstagioEnum eq 'ESTAGIO' and estagioItens.gradeCurricularEstagioVO.codigo eq 0}">
                    <otm2:panel name="panelEstagioRegraAntiga_#{estagioItens.codigo}" styleClassFooter="dn" styleClassHeader="mn bg-gray-100 rounded-top p10" styleClassBody="mn p5">
                        <ui:define name="header">
                            <i class="fas fa-award tituloCampos mr5 fs16"></i>
                            <h:outputText styleClass="tituloCampos font-weight-bold" value="Estágio - #{estagioItens.situacaoEstagioEnum.valor} - #{estagioItens.cargaHoraria}h"/>
                        </ui:define>
                        <ui:define name="body">
                            <otm2:panel name="panelEstagioDadosRegraAntiga_#{estagioItens.codigo}" styleClassFooter="dn" styleClassHeader="">
                                <ui:define name="header">
                                    <h:outputText value="#{msg_aplic.prt_RelatorioEstagioMeusEstagios_DadosEstagio}"/>
                                </ui:define>
                                <ui:define name="body">
                                    <h:panelGroup layout="block" styleClass="col-md-2">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="Empresa"/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.empresaEstagio.nome}"/>
                                    </h:panelGroup>
                                    <h:panelGroup layout="block" styleClass="col-md-2" rendered="#{!empty estagioItens.ano and !empty estagioItens.semestre}">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="Ano/Semestre"/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.ano}/#{estagioItens.semestre}"/>
                                    </h:panelGroup>
                                    <h:panelGroup layout="block" styleClass="col-md-2" rendered="#{!empty estagioItens.ano and empty estagioItens.semestre}">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="Ano"/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.ano}"/>
                                    </h:panelGroup>
                                    <h:panelGroup layout="block" styleClass="col-md-2">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="#{msg_aplic.prt_Forum_situacao}"/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.situacaoEstagioEnum.valor}"/>
                                    </h:panelGroup>
                                    <h:panelGroup layout="block" styleClass="col-md-2">
                                        <h:outputText styleClass="field control-label tituloCampos btn-block" value="#{msg_aplic.prt_RelatorioEstagioMeusEstagios_CHDeferida}"/>
                                        <h:outputText styleClass="field control-label campos btn-block" value="#{estagioItens.cargaHorariaDeferida}"/>
                                    </h:panelGroup>
                                </ui:define>
                            </otm2:panel>
                            <otm2:panel name="panelEstagioArquivoRegraAntiga_#{estagioItens.codigo}" styleClassFooter="dn" styleClassHeader="">
                                <ui:define name="header">
                                    <h:outputText value="Arquivo"/>
                                </ui:define>
                                <ui:define name="body">
                                    <h:panelGroup styleClass="ajustarConteudoNoCentro">
                                        <otm:commandButton action="#{EstagioControle.visualizarArquivoEstagioRegraAntiga}" value="Visualizar Arquivo" accesskey="1" update="panelPreview, formPreview" oncomplete="PF('panelPreview').show()" icon="#{msg_botoes.btn_icon_verificar_embutido}" styleClass="btn btn-primary"/>
                                    </h:panelGroup>
                                </ui:define>
                            </otm2:panel>
                        </ui:define>
                    </otm2:panel>
                </h:panelGroup>
            </ui:repeat>
            <h:panelGroup layout="block" styleClass="row">
            	<otm:mensagem bean="#{EstagioControle}"/>
            </h:panelGroup>
            <h:panelGroup styleClass="barraFlutuanteInferior" layout="block">
            	<otm:commandButton id="btnIncluirNovoEstagio" icon="#{msg_botoes.btn_icon_adicionar_embutido}" styleClass="btn btn-info" update="form" process="form" value="#{msg_aplic.prt_RelatorioEstagioMeusEstagios_IncluirNovoEstagio}" action="#{EstagioControle.cadastrarEstagioTelaInicialVisaoAluno}"/>
            </h:panelGroup>
        </h:form>
    </ui:define>
</ui:composition>
</html>
