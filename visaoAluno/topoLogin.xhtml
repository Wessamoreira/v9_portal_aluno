<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:h="http://java.sun.com/jsf/html"

	xmlns:f="http://java.sun.com/jsf/core"

	xmlns:ui="http://java.sun.com/jsf/facelets"
	
	
	xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br">
	
	<form id="formTopoLogin">
		<div align="center" >
	
			<div>
				<h:graphicImage alt="imagemAluno" class="divFotoAluno" value="#{LoginControle.caminhoFotoUsuario}" />
			</div>
			<div>
				<h:outputText value="#{LoginControle.usuarioLogado.nome_Apresentar}" style="color:white;top:12px;position: relative;" />
			</div>
			<div>
				<h:outputText id="matriculaTopoLogin" style="font-size: 12px;color:white; top:6px; position: relative; " value="Matrícula: #{VisaoAlunoControle.matricula.matricula}" />
			</div>
			<div>
				<otm:commandIcon icon="#{msg_botoes.btn_icon_calendario}"
					style="color:white; top:12px;position: relative; width:20px" />
				<h:outputText  value="#{LoginControle.diaSemanaLoginSemHora}, #{LoginControle.dataUltimoAcesso} " style="color:white;top:12px;position: relative;left:5px" />
			</div>
		</div>
	</form>

</ui:composition>
