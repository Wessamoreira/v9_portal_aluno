	<h:outputScript name="jquery.color.js" library="script/crop" />
	<h:outputScript name="jquery.Jcrop.js" library="script/crop" />

			vertical-align: middle !important;
			background-color: #ffffff !important;

</h:head> <ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="tituloPagina">
		<h:outputText value="Secretaria On-line" />
	</ui:define>



	<ui:define name="modal">

		<p:dialog styleClass="modalMaximizado" id="panelPreviewAnexo" widgetVar="panelPreviewAnexo" resizeable="true" width="800" height="600" domElementAttachment="parent" autosized="false" shadowOpacity="true" top="10">
			<f:facet name="header">
				<h:outputText styleClass="field control-label tituloCampos" value="Visualizar Anexo"></h:outputText>
			</f:facet>
			<h:form id="formPreviewAnexo">
				<h:panelGroup layout="block" styleClass="row">
					<h:panelGroup layout="block" rendered="#{RequerimentoControle.isAnexoPDF}" style="margin-top: 15px" styleClass="col-md-12 text-center">
						<otm:pdfView id="pdfAnexoPDF" toolbar="1" data="#{RequerimentoControle.caminhoPreviewAnexo}" />
					</h:panelGroup>
					<h:panelGroup layout="block" rendered="#{RequerimentoControle.isAnexoImagem}" style="margin-top: 15px" styleClass="col-md-12 text-center">
						<h:graphicImage id="pdfAnexoImg" url="#{RequerimentoControle.caminhoPreviewAnexo}" />
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-80">
						<otm:commandButton id="btnFecharAnexo" value="Fechar" icon="#{msg_botoes.btn_icon_fechar_embutido}" styleClass="btn btn-danger" style="margin-left: 5px" update="formPreviewAnexo" oncomplete="PF('panelPreviewAnexo').hide();" />
					</h:panelGroup>
				</h:panelGroup>
			</h:form>
		</p:dialog>

<p:dialog styleClass="modalMaximizado100" id="panelConfirmarNegociacao" shadowOpacity="true">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="Visualizar Negociação"></h:outputText>
				</h:panelGroup>
			</f:facet>
			<h:form id="formConfirmarNegociacao">
				<h:panelGroup layout="block" styleClass="row row-overflow">
<!--					<p:jsFunction name="calcularValorTotalConfirmacaoNegociacao" listener="#{RequerimentoControle.calcularValorTotalConfirmacaoNegociacao}" render="formConfirmarNegociacao" execute="formConfirmarNegociacao"></p:jsFunction>-->
					<p:dataTable id="contaReceber" width="100%" columnClasses="colunaCentralizada" headerClass="consulta" rowClasses="linhaImpar, linhaPar" value="#{RequerimentoControle.negociacaoContaReceberVO.novaContaReceber}" var="contaReceberItens">
						<p:column>
							<f:facet name="header">
								<h:outputText value="#{msg_aplic.prt_ContaReceber_parcela}" />
							</f:facet>
							<h:outputText value="#{contaReceberItens.parcela}" />
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="#{msg_aplic.prt_ContaReceber_dataVencimento}" />
							</f:facet>
							<h:panelGroup layout="block" styleClass="col-md-12 pn h36">
							<otm:calendar disabled="true" id="data" jsFunction="calcularValorTotalConfirmacaoNegociacao()" inputClass="form-control form-control-input-table" inputSize="10" value="#{contaReceberItens.dataVencimento}">
							</otm:calendar>
							</h:panelGroup>
						</p:column>
						<p:column>
							<f:facet name="header">
								<h:outputText value="#{msg_aplic.prt_ContaReceber_dataCompetencia}" />
							</f:facet>
							<h:panelGroup layout="block" styleClass="col-md-12 pn h36">
							<otm:calendar disabled="true" id="dataCompetencia" jsFunction="calcularValorTotalConfirmacaoNegociacao()" inputClass="form-control campos form-control-input-table" value="#{contaReceberItens.dataCompetencia}">
							</otm:calendar>
							</h:panelGroup>
						</p:column>
						
						<p:column>
							<f:facet name="header">
								<h:outputText value="#{msg_aplic.prt_ContaReceber_valor}" />
							</f:facet>
							<h:inputText disabled="true" size="10" onkeydown="aceitarSomenteValorDecimal(this)" styleClass="form-control form-control-input-table" value="#{contaReceberItens.valor}">
								<p:ajax event="change" render="formConfirmarNegociacao" execute="formConfirmarNegociacao" listener="#{RequerimentoControle.calcularValorTotalConfirmacaoNegociacao}" />
								<f:converter converterId="FormatadorNumerico" />
							</h:inputText>
						</p:column>
					</p:dataTable>
				</h:panelGroup>
				<h:panelGroup layout="block" id="msg" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-12 text-right">
						<h:panelGroup layout="block" styleClass="col-md-8 text-right">
							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Negociação:" />
						</h:panelGroup>
						<h:panelGroup layout="block" styleClass="col-md-4 text-right">
							<h:outputText styleClass="field control-label tituloCampos" value=" #{RequerimentoControle.negociacaoContaReceberVO.valorTotal}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</h:panelGroup>
					</h:panelGroup>
					<otm:mensagem bean="#{RequerimentoControle}" />
					<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-100">
						<otm:commandButton rendered="#{RequerimentoControle.requerimentoVO.codigo eq 0}" id="confirmar" render="formConfirmarNegociacao, form" oncomplete="#{RequerimentoControle.fecharModal}" value="Confirmar" styleClass="btn btn-dark btn-gravar" alt="#{msg.msg_gravar_dados}" />
						<otm:spacer  width="10px" />
						<otm:commandButton   rendered="#{RequerimentoControle.requerimentoVO.codigo eq 0}"  id="fechar" render="form, formNegociar"  oncomplete="#PF('panelNegociar').show(), #PF('panelConfirmarNegociacao').hide()" icon="#{msg_botoes.btn_icon_cancelar_embutido}" value="Fechar" styleClass="btn btn-danger" />
						<otm:commandButton  rendered="#{RequerimentoControle.requerimentoVO.codigo ne 0}"  id="Fechar" render="formConfirmarNegociacao, form" oncomplete="#{RequerimentoControle.fecharModal}" value="Fechar" styleClass="btn btn-danger" alt="#{msg.msg_gravar_dados}" />
					</h:panelGroup>
				</h:panelGroup>
			</h:form>
		</p:dialog>


	<p:dialog id="panelNegociar" styleClass="modalMaximizado" onshow="document.getElementById('formNegociar:valorEntrada').focus();" shadowOpacity="true" width="850" height="500">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="#{msg_aplic.prt_NegociacaoContaReceber_tituloForm}"></h:outputText>
				</h:panelGroup>
			</f:facet>
			<f:facet name="controls">
				<h:panelGroup>
					<h:graphicImage value="#{resource['/imagens/close.png']}" styleClass="icon-close-modal" style="cursor:pointer" id="hidelink8" />
					<otm:componentControl target="panelNegociar" operation="hide" event="click" />
				</h:panelGroup>
			</f:facet>
			<h:form id="formNegociar">
				<h:panelGroup id="panelFormNegociar">
					<h:panelGroup layout="block" rendered="#{RequerimentoControle.negociacaoContaReceberVO.permitirRenegociacaoApenasComCondicaoRenegociacao}" styleClass="col-md-6">
						<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_CondicaoRenegociacao_CondicaoRenegocicao}" />
						<h:selectOneMenu styleClass="form-control camposObrigatorios" id="comboBoxItemCondicaoRenegociacao" value="#{RequerimentoControle.negociacaoContaReceberVO.itemCondicaoRenegociacao.codigo}">
							<f:selectItems value="#{RequerimentoControle.listaSelectItemItemCondicaoRenegociacao}" />
							<p:ajax update="formNegociar" execute="@form" listener="#{RequerimentoControle.atualizarParcelasNegociacao}" />
						</h:selectOneMenu>
					</h:panelGroup>
					
					<h:panelGroup layout="block" styleClass="col-md-3">
							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Dívida Atual" />
							<h:inputText disabled="true" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorComJurosMultasCalculado}">
								<f:converter converterId="FormatadorNumerico" />
							</h:inputText>
						</h:panelGroup>
						<h:panelGroup layout="block" styleClass="col-md-3">
							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Acréscimos" />
							<h:inputText disabled="true" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorAcrescimoCalculado}">
								<f:converter converterId="FormatadorNumerico" />
							</h:inputText>
						</h:panelGroup>
						
						<h:panelGroup layout="block" styleClass="col-md-3">
							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Desconto" />
							<h:inputText disabled="true" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorDescontoCalculado}">
								<f:converter converterId="FormatadorNumerico" />
							</h:inputText>
						</h:panelGroup>
						
<!-- 							<h:panelGroup layout="block" styleClass="col-md-3"> -->
<!-- 							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Juros" /> -->
<!-- 							<h:inputText disabled="true" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorJuroCalculado}"> -->
<!-- 								<f:converter converterId="FormatadorNumerico" /> -->
<!-- 							</h:inputText> -->
<!-- 						</h:panelGroup> -->
<!-- 						<h:panelGroup layout="block" styleClass="col-md-3"> -->
<!-- 							<h:outputText styleClass="field control-label tituloCampos" value="Valor Total Multa" /> -->
<!-- 							<h:inputText disabled="true" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorMultaCalculado}"> -->
<!-- 								<f:converter converterId="FormatadorNumerico" /> -->
<!-- 							</h:inputText> -->
<!-- 						</h:panelGroup> -->
					
						<h:panelGroup layout="block" styleClass="col-md-3">
							<h:outputText styleClass="field control-label tituloCampos" value="Entrada de R$ " />
							<h:inputText id="valor" size="20" maxlength="20" styleClass="form-control camposObrigatorios" value="#{RequerimentoControle.negociacaoContaReceberVO.valorEntrada}" onkeydown="aceitarSomenteValorDecimal(this)">
								<f:converter converterId="FormatadorNumerico" />
								<p:ajax event="change" update="formNegociar"  />
							</h:inputText>
						</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-3" >
						<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_NegociacaoContaReceber_nrParcela}"  />
						<h:inputText id="nrParcela" onkeydown="aceitarSomenteValorNumerico(this)" size="4" maxlength="4" styleClass="form-control camposObrigatorios" value="#{RequerimentoControle.negociacaoContaReceberVO.nrParcela}" >
							<p:ajax event="change" execute="@this" oncomplete="return focus('formNegociar:acrescimoPorParcela');" update="panelFormNegociar" listener="#{RequerimentoControle.realizarCalculoValorBaseParcela}"></p:ajax>
						</h:inputText>
					</h:panelGroup>
						<h:panelGroup layout="block" styleClass="col-md-3" >
						<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_NegociacaoContaReceber_dataBaseParcela}" />
						<h:panelGroup layout="block" styleClass="col-md-12 pn h36">
							<otm:calendar id="dataBaseParcela" inputClass="form-control camposObrigatorios" value="#{RequerimentoControle.negociacaoContaReceberVO.dataVencimentoEntrada}" />
						</h:panelGroup>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-3" >
						<h:outputText styleClass="field control-label tituloCampos" value="Valor Por Parcela"  />
						<h:inputText id="valorTotalAcrescimoPorParcela" readonly="true" size="12" maxlength="12" styleClass="form-control camposSomenteLeitura" value="#{RequerimentoControle.valorBaseParcela}" >
							<f:converter converterId="FormatadorNumerico" />
						</h:inputText>
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="row">
					<otm:mensagem bean="#{RequerimentoControle}" />
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-80">
					<otm:commandButton action="#{RequerimentoControle.gerarParcelas}" oncomplete="#{RequerimentoControle.abrirModalRenegociacao}" update="formNegociar, formConfirmarNegociacao, form" value="Visualizar Parcelas" styleClass="btn btn-dark " icon="#{msg_botoes.btn_icon_gravar_embutido}" />
				</h:panelGroup>
			</h:form>
		</p:dialog>


	<p:dialog styleClass="modalMaximizado100" id="panelContaReceber" top="5px" onhide="#{RequerimentoControle.fecharContaReceber}" shadowOpacity="true" width="1000" height="600">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="#{msg_aplic.prt_ContaReceber_tituloForm}" />
				</h:panelGroup>
			</f:facet>
			<f:facet name="controls">
				<h:panelGroup>
					<h:graphicImage value="#{resource['imagens/close.png']}" styleClass="icon-close-modal" style="cursor:pointer" id="hidelink6" />
					<otm:componentControl target="panelContaReceber" operation="hide" event="click" />
				</h:panelGroup>
			</f:facet>
			<h:form id="formContaReceber">
				<h:panelGroup layout="block" styleClass="col-md-12 mt5" />
				<p:dataTable id="resultadoConsultaContaReceber" width="100%" headerClass="consulta" rowClasses="linhaImpar, linhaPar" columnClasses="colunaAlinhamento" value="#{RequerimentoControle.listaConsultaContaReceber}" rows="8" var="contaReceberItens">
					<p:column rendered="#{RequerimentoControle.negociacaoContaReceberVO.tipoResponsavelFinanceiro or RequerimentoControle.negociacaoContaReceberVO.tipoParceiro}">
						<f:facet name="header">
							<h:outputText value="Aluno(a)" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" value="#{contaReceberItens.matriculaAluno.matricula} - #{contaReceberItens.pessoa.nome}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText id="textCodigoContaReceber" value="Código" />
						</f:facet>
						<p:commandLink id="commandLinkCodigoContaReceber" update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" value="#{contaReceberItens.codigo}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText id="textoTipoOrigem" value="#{msg_aplic.prt_ContaReceber_tipoOrigem}" />
						</f:facet>
						<p:commandLink id="commandLinkTipoOrigem" update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" value="#{contaReceberItens.tipoOrigem_apresentar}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="Parcela" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" value="#{contaReceberItens.parcela}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_dataVencimento}" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" value="#{contaReceberItens.dataVencimento_Apresentar}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_nrDocumento}" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}" id="nrDocumento" value="#{contaReceberItens.nrDocumento}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_valor} Original" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}">
							<h:outputText value="#{contaReceberItens.valor_Apresentar}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</p:commandLink>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_juroCifrao}" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}">
							<h:outputText value="#{contaReceberItens.juro}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</p:commandLink>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_multaCifrao}" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}">
							<h:outputText value="#{contaReceberItens.multa}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</p:commandLink>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_valorDescontoRecebido}" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}">
							<h:outputText value="#{contaReceberItens.valorTotalDescontoContaReceber}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</p:commandLink>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_valor} Final" />
						</f:facet>
						<p:commandLink update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" action="#{RequerimentoControle.selecionarContaReceber}">
							<h:outputText value="#{contaReceberItens.valorFinalCalculado}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</p:commandLink>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_botoes.btn_opcoes}" />
						</f:facet>
						<otm:commandIcon action="#{RequerimentoControle.selecionarContaReceber}" update="form, formContaReceber,formNegociarparcelasNegociacaoNaoCumprida, formParcelasIgnoradasNegociacaoPorIntegracaoEmpresaFinanceira" oncomplete="#{RequerimentoControle.oncompleteModal}" icon="#{msg_botoes.btn_icon_selecionar} iconePequeno" />
					</p:column>
					<f:facet name="footer">
						<div style="text-align: center !important">
							<p:dataScroller align="center" boundaryControls="auto" stepControls="auto" fastControls="hide" for="formContaReceber:resultadoConsultaContaReceber" maxPages="10" />
						</div>
					</f:facet>
				</p:dataTable>
				<otm:mensagem bean="#{RequerimentoControle}" />
				<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-100">

				</h:panelGroup>
