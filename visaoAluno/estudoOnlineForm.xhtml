		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado" id="panelIniciarListaExercicio" widgetVar="panelIniciarListaExercicio" width="550" height="250">

						<h:inputText style="width: 40px;left: 6px;position: relative;" value="#{MonitorConhecimentoControle.listaExercicioVO.quantidadeNivelQuestaoFacil}" />
						<otm:spacer width="5px" />
						<h:outputText style="position:relative;left: 6px;" value="questões" />

					<h:panelGroup>
						<h:outputText value="Existem #{MonitorConhecimentoControle.qtdeQuestoesMedias} questões de nível MÉDIO, sortear" />

						<h:inputText style="width: 40px;" value="#{MonitorConhecimentoControle.listaExercicioVO.quantidadeNivelQuestaoMedio}" />
						<otm:spacer width="5px" />
						<h:outputText value="questões" />

						<otm:spacer width="5px" />
						<h:outputText value="questões" />
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="col-md-12" style="text-align: center;top: 10px;position: relative;">
					<otm:commandButton id="realizarGeracaoListaExercicio" action="#{MonitorConhecimentoControle.realizarGeracaoListaExercicio}" update="formIniciarListaExercicio" value="#{msg_botoes.btn_editar}" image="#{resource['/imagens/ead/responder.png']}" />

				<h:panelGroup layout="block" styleClass="col-md-12">

											<h:outputText styleClass="itemIndicePagina" value="#{unidadeItens.ordem}.#{pagina.pagina} - #{pagina.titulo}" />

									</h:panelGroup>
								</h:panelGroup>
							</p:column>
