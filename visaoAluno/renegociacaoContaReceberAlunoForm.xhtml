<ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="tituloPagina">
		<h:outputText value="#{msg_aplic.prt_Renegociacao_tituloForm}" />
	</ui:define>
	<ui:define name="conteudo">
		<h:form prependId="false" id="form">
			<h:panelGroup id="panelGridMensagensGerais" layout="block" rendered="#{!RenegociacaoContaReceberAlunoControle.apresentarDadosRenegociacao and !RenegociacaoContaReceberAlunoControle.apresentarDadosOpcaoRenegociacao and !RenegociacaoContaReceberAlunoControle.apresentarDadosGravados}">
				<otm:mensagem bean="#{RenegociacaoContaReceberAlunoControle}" />
			</h:panelGroup>
			<h:panelGroup layout="block" styleClass="row mn" rendered="#{RenegociacaoContaReceberAlunoControle.apresentarDadosRenegociacao}">
				<h:panelGroup layout="block" styleClass="col-md-12 mb5">
					<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_NegociacaoRecebimento_unidadeEnsino}" />
					<h:selectOneMenu id="unidadeEnsinoFinanceira" styleClass="form-control camposObrigatorios" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.unidadeEnsino.codigo}">
						<p:ajax event="change" process="form" update="form" listener="#{RenegociacaoContaReceberAlunoControle.atualizarContaReceberPorUnidadeEnsinoFinanceira}" />
						<f:selectItems value="#{RenegociacaoContaReceberAlunoControle.listaSelectItemUnidadeEnsino}" />
					</h:selectOneMenu>
				</h:panelGroup>
				<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false"  id="contasReceber" headerClass="subordinado"  value="#{RenegociacaoContaReceberAlunoControle.contaReceberVOs}" var="contaReceberItens">
					<f:facet name="header">
						<h:outputText styleClass="tituloCamposNegrito" style="font-size:24px" rendered="#{RenegociacaoContaReceberAlunoControle.alunoConcordouComTermosRenegociacaoOnLine}" value="#{msg.msg_selecione_contas_renegociacao}" />
					</f:facet>
					<p:column rendered="#{RenegociacaoContaReceberAlunoControle.alunoConcordouComTermosRenegociacaoOnLine}" style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText styleClass="btn-block" value="#{msg_aplic.prt_opcaoRenegociacao_selecionar}" />
							<otm:selectBooleanCheckbox id="selecionarTodos" value="#{RenegociacaoContaReceberAlunoControle.selecionarTodasContas}">
								<p:ajax event="change" process="@form" listener="#{RenegociacaoContaReceberAlunoControle.realizarSelecaoContaReceber}" update="contasReceber" />
							</otm:selectBooleanCheckbox>
						</f:facet>
						<otm:selectBooleanCheckbox id="selecionar" value="#{contaReceberItens.selecionado}">
							<p:ajax event="change" update="contasReceber" />
						</otm:selectBooleanCheckbox>
					</p:column>
					<p:column rendered="#{RenegociacaoContaReceberAlunoControle.isApresentarVisaoPais}" style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="Aluno(a)" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.pessoa.nome}" />
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_dataVencimento}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.dataVencimento_Apresentar}" />
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_parcela}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.parcelaPorConfiguracaoFinanceira_Apresentar}" />
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_valor}(R$)" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.valor}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="Juro#{msg_aplic.prt_ContaReceber_juro}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.juro}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="Multa#{msg_aplic.prt_ContaReceber_multa}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.multa}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_acrescimo}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.acrescimo}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column rendered="#{RenegociacaoContaReceberAlunoControle.configuracaoFinanceiroVO.indiceReajustePadraoContasPorAtrasoVO.codigo ne 0}" style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{RenegociacaoContaReceberAlunoControle.configuracaoFinanceiroVO.indiceReajustePadraoContasPorAtrasoVO.descricao}" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.valorIndiceReajustePorAtraso}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_desconto}(R$)" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.valorTotalDesconto}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important; width: 9.09%">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContaReceber_valorFinal}(R$)" />
						</f:facet>
						<h:outputText value="#{contaReceberItens.valorReceberCalculado}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</p:column>
					<f:facet name="footer">
						<div align="right">
							<h:outputText style="font-size:16px; color:red" styleClass="field control-label  text-danger" value="Valor Total Selecionado: " />
							<h:outputText style="font-size:16px; color:red" styleClass="field control-label  text-danger" value="#{RenegociacaoContaReceberAlunoControle.valorTotalContaReceberVisaoAluno}">
								<f:converter converterId="FormatadorNumerico" />
							</h:outputText>
						</div>
					</f:facet>
				</p:dataTable>
				<h:panelGroup layout="block" styleClass="row" rendered="#{RenegociacaoContaReceberAlunoControle.alunoConcordouComTermosRenegociacaoOnLine}">
					<h:panelGroup layout="block" styleClass="col-md-12 text-center">
						<otm:commandButton id="botaoAvancarTela" action="#{RenegociacaoContaReceberAlunoControle.realizarConfirmacaoSelecaoContaReceber}" update="form" value="Negociar Parcelas Selecionadas" icon="#{msg_botoes.btn_icon_avancar_embutido}" />
					</h:panelGroup>
				</h:panelGroup>
			</h:panelGroup>
			<h:panelGroup id="pgPrincipal2" layout="block" styleClass="row mn" rendered="#{RenegociacaoContaReceberAlunoControle.apresentarDadosOpcaoRenegociacao}">
				<h:panelGroup layout="block" styleClass="col-md-12">
					<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_CondicaoRenegociacao_CondicaoRenegocicao}" />
					<h:selectOneMenu styleClass="form-control camposObrigatorios" id="comboBoxItemCondicaoRenegociacao" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.itemCondicaoRenegociacao.codigo}">
						<f:selectItems value="#{RenegociacaoContaReceberAlunoControle.listaSelectItemItemCondicaoRenegociacao}" />
						<p:ajax update="form" listener="#{RenegociacaoContaReceberAlunoControle.atualizarParcelasNegociacao}" />
					</h:selectOneMenu>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="col-md-12 mt5" />
				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-danger fs14" value="Valor Total Renegociado R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-danger fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorTotalSemIsencaoJurosMultaIndice}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>

				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-success fs14" value="Valor abatido de juros R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-success fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorJuroDesconto}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>
				<!-- 				rendered="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.itemCondicaoRenegociacao.isentarMultaParcela  and RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorMultaDesconto ne 0.0}" -->
				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-success fs14" value="Valor abatido de multa R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-success fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorMultaDesconto}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>
				<!-- 				rendered="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.itemCondicaoRenegociacao.isentarIndiceReajustePorAtrasoParcela and RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorIndiceReajusteDesconto ne 0.0}" -->
				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center mt5" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-success fs14" value="Valor abatido de índice de reajuste R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-success fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorIndiceReajusteDesconto}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>
				<!-- 				rendered="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorDescontoCondicaoRenegociacao ne 0.0}" -->
				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center mt5" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-success fs14" value="Descontos Concedidos R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-success fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorDescontoCondicaoRenegociacao}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>
				<!-- 				rendered="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorAcrescimoCondicaoRenegociacao ne 0.0}" -->
				<h:panelGroup layout="block" styleClass="col-md-4 pn border rounded text-center mt5" style="padding-bottom: 5px !important">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-danger fs14" value="Acréscimos R$" />
					</h:panelGroup>
					<h:outputText styleClass="field control-label text-danger fs14" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorAcrescimoCondicaoRenegociacao}">
						<f:converter converterId="FormatadorNumerico" />
					</h:outputText>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="col-md-12 pn border rounded text-center mt5" style="padding-bottom: 5px !important" rendered="#{RenegociacaoContaReceberAlunoControle.apresentarValorFinalRenegociado}">
					<h:panelGroup layout="block" styleClass="col-md-12 border rounded bg-gray p5">
						<h:outputText styleClass="field control-label text-danger fs16" value="Valor Final Renegociado R$" />
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-2">
						<h:outputText styleClass="field control-label text-danger fs16" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorTotal}">
							<f:converter converterId="FormatadorNumerico" />
						</h:outputText>
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="row mt10">
					<h:panelGroup layout="block" styleClass="col-md-6">
						<h:outputText styleClass="field control-label tituloCampos" value="#{RenegociacaoContaReceberAlunoControle.mensagemFaixaEntradaApresentar}" />
						<h:outputText styleClass="field control-label tituloCampos" value=" com vencimento em  #{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.dataVencimentoEntradaApresentar}" />
						<h:inputText id="valor" size="20" maxlength="20" styleClass="form-control camposObrigatorios" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.valorEntrada}" onkeydown="aceitarSomenteValorDecimal(this)">
							<f:converter converterId="FormatadorNumerico" />
							<p:ajax event="change" update="pgPrincipal2" listener="#{RenegociacaoContaReceberAlunoControle.validarValorEntrada}" />
						</h:inputText>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-12 mt10">
						<p:selectOneRadio layout="grid" columns="3" styleClass="grid-checkbox" id="nrParcela" layout="pageDirection" disabledClass="ml10 p10 field control-label  tituloCampos fs14" enabledClass="ml10 p5 field control-label  tituloCampos fs14 " styleClass="field control-label  tituloCampos fs14 ml10" value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.nrParcela}">
							<f:selectItems value="#{RenegociacaoContaReceberAlunoControle.listaSelectItemOpcaoRenegociacao}" />
							<p:ajax event="click" update="btns" process="@this" listener="#{RenegociacaoContaReceberAlunoControle.selecionarCondicaoRenegociacao}">
							</p:ajax>
						</p:selectOneRadio>
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="barraFlutuanteInferior">
					<otm:commandButton action="#{RenegociacaoContaReceberAlunoControle.voltarSelecaoContaReceber}" update="form" value="Voltar" icon="#{msg_botoes.btn_icon_voltar}" styleClass="btn btn-primary" />
					<otm:spacer width="5px" />
					<otm:commandButton id="btnConfirmarRenegociacao" action="#{RenegociacaoContaReceberAlunoControle.realizarConfirmacaoNegociacao}" oncomplete="#{RenegociacaoContaReceberAlunoControle.oncompleteModal}" update="formConfirmacao, form" rendered="#{RenegociacaoContaReceberAlunoControle.apresentarBotaoConfirmarNegociacao}" value="Confirmar Renegociação" icon="#{msg_botoes.btn_icon_selecionar_embutido}" styleClass="btn btn-dark" />
				</h:panelGroup>
			</h:panelGroup>
			<p:remoteCommand name="abrirModalPagamentoOnline" update="formPagamento" oncomplete="#{RenegociacaoContaReceberAlunoControle.modalPagamentoOnline}; #{RenegociacaoContaReceberAlunoControle.modalConfirmacaoPagamento};" />
			<h:panelGroup layout="block" styleClass="row" rendered="#{RenegociacaoContaReceberAlunoControle.apresentarDadosGravados}">
				<h:panelGroup layout="block" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-12 text-center">
						<h:outputText styleClass="tituloCamposNegrito" value="#{msg.msg_renegociacao_gravada}" />
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup id="consultaContasAPagar" layout="block" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-12">
						<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false"  id="itemsContasAPagar" width="100%" headerClass="consulta" style="background-color:transparent;"  value="#{RenegociacaoContaReceberAlunoControle.negociacaoContaReceberVO.novaContaReceber}" var="contaAPagarItens">
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ContaReceber_dataVencimento}" />
								</f:facet>
								<h:outputText value="#{contaAPagarItens.dataVencimento_Apresentar}" />
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ContaReceber_parcela}" />
								</f:facet>
								<h:outputText value="#{contaAPagarItens.parcela}" />
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ContaReceber_nossoNumero}" />
								</f:facet>
								<h:outputText value="#{contaAPagarItens.nossoNumero}" />
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ContaPagar_valor}" />
								</f:facet>
								<h:outputText value="R$ " />
								<h:outputText value="#{contaAPagarItens.valor}">
									<f:converter converterId="FormatadorNumerico" />
								</h:outputText>
							</p:column>
							<p:column style="text-align: center !important" rendered="#{!RenegociacaoContaReceberAlunoControle.contaRecebida}">
								<f:facet name="header">
									<h:outputText value="#{msg_botoes.btn_opcoes}" />
								</f:facet>
								<h:panelGroup rendered="#{!contaAPagarItens.bloquearPagamentoVisaoAluno}">
									<h:outputLink rendered="#{!contaAPagarItens.emissaoBloqueada and contaAPagarItens.permiteImprimirBoleto and contaAPagarItens.habilitarBotaoRecebimento}" value="../BoletoBancarioSV?codigoContaReceber=#{contaAPagarItens.codigo}&amp;titulo=matricula">
										<span class="#{msg_botoes.btn_icon_imprimir} iconePequeno rounded" />
									</h:outputLink>
									<p:commandLink rendered="#{!contaAPagarItens.emissaoBloqueada and contaAPagarItens.permiteImprimirBoletoLinkBanco and contaAPagarItens.habilitarBotaoLinkBanco}" oncomplete="PF('panelLinkBanco').show()" process="@this" update="formLinkBanco" title="Imprimir Boleto">
										<f:setPropertyActionListener value="#{contaAPagarItens}" target="#{RenegociacaoContaReceberAlunoControle.contaReceberVisaoAluno}" />
										<span class="#{msg_botoes.btn_icon_imprimir} iconePequeno rounded" />
									</p:commandLink>
									<!-- Seria o Terceiro botao, Dialog Mensagem Bloqueio -->
									<otm:commandButton id="emissaoBoletoBloqueada" rendered="#{contaAPagarItens.emissaoBloqueada and !contaAPagarItens.permiteImprimirBoletoLinkBanco}" action="#{RenegociacaoContaReceberAlunoControle.editarContaReceberVisaoAluno}" oncomplete="PF('panelEmissaoBloqueada').show()" update="formEmissaoBloqueada" icon="#{msg_botoes.btn_icon_bloqueado} iconePequeno" />
								</h:panelGroup>
							</p:column>
						</p:dataTable>
						<h:panelGroup layout="block" styleClass="col-md-12 text-center mt5">
