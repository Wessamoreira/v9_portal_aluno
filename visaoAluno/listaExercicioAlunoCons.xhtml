<ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="tituloPagina">
		<h:outputText rendered="#{VisaoAlunoControle.ambienteVisaoAluno}" value="#{msg_aplic.prt_ListaExercicio_tituloForm}" />
		<h:outputText rendered="#{!VisaoAlunoControle.ambienteVisaoAluno}" value="#{msg_aplic.prt_ListaExercicio_tituloForm} - #{ListaExercicioControle.matriculaPeriodoTurmaDisciplinaVO.disciplina.nome}" />
	</ui:define>
	<ui:define name="conteudo">
		<h:form prependId="false" id="form">
			<p:commandLink action="#{ListaExercicioControle.liberarBackingBeanMemoria}" id="idLiberarBackingBeanMemoria" style="display: none" />
			<h:panelGroup id="panelGroupForm" layout="block" styleClass="row">
				<h:panelGroup id="dadosBasicos" rendered="#{VisaoAlunoControle.ambienteVisaoAluno}" layout="block" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-6">
						<h:outputText styleClass="field control-label tituloCampos" value="#{msg_aplic.prt_ListaExercicio_disciplina}" />
						<h:selectOneMenu styleClass="form-control camposObrigatorios" value="#{ListaExercicioControle.matriculaPeriodoTurmaDisciplinaVO.codigo}">

						</h:selectOneMenu>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-12 text-center mt10">
						<p:commandLink id="consultar" update="panelGroupForm" value="#{msg_botoes.btn_consultar}" action="#{ListaExercicioControle.consultarListaExercicioVisaoAluno}" styleClass="btn btn-default btn-consultar" alt="#{msg.msg_consultar_dados}" accesskey="2">
							<span class="fa fa-search pull-left" style="margin-right: 0.8em; position: relative; top: 3px; font-size: 14px;"></span>
							<f:setPropertyActionListener for="consultar" target="#{ListaExercicioControle.controleConsultaOtimizado.paginaAtual}" value="1" />
							<f:setPropertyActionListener for="consultar" target="#{ListaExercicioControle.controleConsultaOtimizado.page}" value="1" />
						</p:commandLink>
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-12" style="margin-top: 10px">
						<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false" headerClass="consulta" width="100%" id="items" rowKeyVar="row" rendered="#{ListaExercicioControle.controleConsultaOtimizado.apresentarListaConsulta}" value="#{ListaExercicioControle.controleConsultaOtimizado}" rows="10" var="listaExercicioItem">
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ListaExercicio_codigo}" />
								</f:facet>
								<p:commandLink action="#{ListaExercicioControle.editar}">
									<h:outputText value="#{listaExercicioItem.codigo}" />
								</p:commandLink>
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ListaExercicio_exercicios}" />
								</f:facet>
								<p:commandLink action="#{ListaExercicioControle.editar}">
									<h:outputText value="#{listaExercicioItem.descricao}" />
								</p:commandLink>
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="#{msg_aplic.prt_ListaExercicio_periodoDisponibilizacaoListaExercicio}" />
								</f:facet>
								<p:commandLink action="#{ListaExercicioControle.editar}">
									<h:outputText value="#{listaExercicioItem.periodoDisponibilizacaoApresentar}" />
								</p:commandLink>
							</p:column>
							<p:column style="text-align: center !important">
								<f:facet name="header">
									<h:outputText value="Responder" />
								</f:facet>
								<otm:commandIcon id="btnEditarListaExercicio" icon="#{msg_botoes.btn_icon_responder} iconePequeno" action="#{ListaExercicioControle.editar}" tooltip="Responder" />
							</p:column>
							<f:facet name="footer">
								<div style="text-align: center !important">
								</div>
							</f:facet>
						</p:dataTable>
						<otm2:dataScroller id="scResultadoConsulta" scrollListener="scrollListener" bean="#{ListaExercicioControle}" dadosConsulta="controleConsultaOtimizado" />
					</h:panelGroup>
				</h:panelGroup>
					<!-- 					<rich:effect for="form" targetId="msgFloat2" event="onclick" type="Fade" params="delay:0.3,duration:0.5"></rich:effect> -->
					<!-- 					<rich:effect for="form" targetId="msgFloat2" event="onkeydown" type="Fade" params="delay:0.3,duration:0.5"></rich:effect> -->

							<otm:spacer width="2%"/>
							<h:outputText styleClass="field control-label mensagem " value="#{ListaExercicioControle.mensagem}" />
							<otm:spacer width="2%"/>
							<h:dataTable id="mensagens2" width="100%" headerClass="rich-panel-header" styleClass="field control-label mensagemDetalhada col-md-12" columnClasses="colunaEsquerda" value="#{ListaExercicioControle.listaMensagemErro}" var="mensagem" rows="3">
								<p:column>
									<h:outputText value="#{mensagem}" />
								</p:column>
							</h:dataTable>
						</h:panelGroup>
						
					</p:panel> -->
				<h:panelGroup id="panelGridMensagens" layout="block" styleClass="row">
					<otm:mensagem bean="#{ListaExercicioControle}"></otm:mensagem>
				</h:panelGroup>
			</h:panelGroup>
		<p:growl escape="false" showDetail="true" showSummary="false" globalOnly="true"></p:growl></h:form>
	</ui:define>
</ui:composition>
</html>
