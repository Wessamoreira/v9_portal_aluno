<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui" xmlns:h="http://java.sun.com/jsf/html"
 xmlns:f="http://java.sun.com/jsf/core"
 xmlns:ui="http://java.sun.com/jsf/facelets"   xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br">

<ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="topo">
		<ui:include src="/visaoAluno/topoEstudoOnline.xhtml"></ui:include>
	</ui:define>
	<h:form prependId="false" id="formTituloNavegador">
		<ui:define name="tituloNavegador">
			<h:outputText value="Contéudo - #{ConteudoControle.conteudo.disciplina.nome}"></h:outputText>
		</ui:define>
		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>
	</h:form>
	<ui:define name="css">
		<h:form prependId="false" id="formCss">
			<style type="text/css">
				#{LoginControle.scriptCssGerado}
				.tabconteudoead {#{ConteudoControle.backgroundPagina}}
				.tabconteudo {
					min-height: calc(100vh - 150px);
					max-height: calc(100vh - 150px);
					height: calc(100vh - 130px);
				}
				
				.panelConteudoCentral {
					height: calc(100vh - 220px) !important;
					max-height: calc(100vh - 220px) !important;
					overflow: auto
				}
				
				.panelBotoesRodape {
					height: 50px;
					position: relative;
					left: -16px;
					border-radius: 0px 0px 5px 5px;
					padding-top: 7px;
					padding-right: 4px;
					width: calc(100% + 32px) !important;
				}
				
				.sticky-footer {
					display: none !important;
				}
				
				.hiddendiv {
					display: none;
					white-space: pre-wrap;
					width: 500px;
					min-height: 50px;
					font-family: Arial, sans-serif;
					font-size: 13px;
					padding: 5px;
					word-wrap: break-word;
				}
				
				@media ( max-width : 770px) {
					.panelBotoesRodape {
						border-top: 5px solid #e5eaee !important;
						text-align: center;
						position: fixed;
						bottom: 0px;
						width: 100%;
						padding: 10px;
						background: #fff !important;
						left: 0px;
						z-index: 2000;
						height: auto;
					}
					.btnAvancar {
						margin-right: 33px;
					}
				}
				
				.tabConteudoCentralMaximizado {
					position: fixed;
					top: 0px;
					z-index: 3000;
					left: 0px;
					width: 100% !important;
					height: calc(100%);
					max-height: calc(100%);
				}
				
				.panelConteudoCentralMaximizado {
					height: calc(100vh - 80px) !important;
					max-height: calc(100vh - 80px) !important;
				}
				
				.interacaoForum {
					height: auto;
					resize: vertical;
					line-height: 20px;
				}
				</style>
				<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>
		</h:form>
	</ui:define>

	<ui:define name="subTituloPagina">
		<h:form prependId="false" id="formSubTituloPagina">
			<h:panelGroup id="navTp" rendered="#{!ConteudoControle.naoExisteConteudoCadastrado}" layout="block" styleClass="row">
				<h:panelGroup id="tituloTp" layout="block" styleClass="float-left">
					<h:outputText styleClass="fs12 text-white font-weight-bold rounded-circle p5 bg-info" value="#{ConteudoControle.unidadeConteudoVO.ordem}.#{ConteudoControle.conteudoUnidadePagina.pagina}" />
					<h:outputText styleClass="fs16 text-dark font-weight-bold ml5 mt5" style="position:relative;top:3px" value="#{ConteudoControle.unidadeConteudoVO.titulo} - #{ConteudoControle.conteudoUnidadePagina.titulo}" />
					<h:panelGroup layout="block" styleClass="btn-block">
						<h:panelGroup styleClass="ml40" rendered="#{ConteudoControle.conteudo.pontoTotal gt 0}">
							<h:outputText styleClass="fs10 text-info" value="Pontos: " />
							<h:outputText styleClass="fs10 text-info" value="#{ConteudoControle.totalPontoAtingido}/#{ConteudoControle.conteudo.pontoTotal}" />
						</h:panelGroup>
						<h:panelGroup styleClass="ml10" rendered="#{ConteudoControle.conteudo.pontoTotal>0}">
							<h:outputText styleClass="fs10 text-info" value="Evolução: " />
							<h:outputText styleClass="fs10 text-info" value="#{ConteudoControle.porcentagemEvolucaoConteudo}" />
						</h:panelGroup>
						<h:panelGroup styleClass="ml10" rendered="#{ConteudoControle.totalAcessoPagina>0}">
							<h:outputText styleClass="fs10 text-info" value="Acessos: " />
							<h:outputText styleClass="fs10 text-info" value="#{ConteudoControle.totalAcessoPagina}" />
						</h:panelGroup>
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGroup id="menuConteudo" layout="block" styleClass="float-right" style="position:relative;top:5px">
					<h:panelGroup styleClass="p5" id="anotacaoConteudo" rendered="#{!ConteudoControle.naoExisteConteudoCadastrado}">
						<otm:commandIcon id="btnAnotacao" tooltip="Registrar/Visualizar Anotações do Conteúdo" update="formAnotacao, mensagemAnotacao" oncomplete="PF('panelAnotacao').show()" action="#{ConteudoControle.verificarAnotacao}" icon="fas fa-sticky-note #{ConteudoControle.imagemComAnotacaoSemAnotacao ? 'text-success': 'text-info'} fs16 mr5" styleIcon=" " />
					</h:panelGroup>
					<h:panelGroup id="gatilhosVisualizados" rendered="#{!empty ConteudoControle.conteudoUnidadePagina.conteudoUnidadePaginaRecursoEducacionalManterDisponivelVOs}">
						<ui:repeat value="#{ConteudoControle.conteudoUnidadePagina.conteudoUnidadePaginaRecursoEducacionalManterDisponivelVOs}" var="gatilhoItens">
							<h:panelGroup styleClass="p5">
								<otm:commandIcon process="@form" direction="topAuto" action="#{ConteudoControle.visualizarGatilho}" update="formAddRecursoEducacional, formMensagem" oncomplete="#{ConteudoControle.modalPanelAddRecursoEducacional}; #{ConteudoControle.modalMensagemAvisoAluno}; " tooltip="#{gatilhoItens.titulo}" icon="#{gatilhoItens.tipoRecursoEducacional.icone}  fs16 mr5" styleIcon=" " />
							</h:panelGroup>
						</ui:repeat>
					</h:panelGroup>
				</h:panelGroup>
			</h:panelGroup>

			<h:panelGroup id="progresso" layout="block" styleClass="float-left bg-success d-block " style=" height:3px ; position:relative ; top:1px ;    left:-5px ; width: #{ConteudoControle.conteudo.percentEstudado+2}%">
				<otm:spacer width="100%" height="3px"></otm:spacer>
				<p:tooltip for="progresso" value="Você visualizou #{ConteudoControle.conteudo.percentEstudado}% do seu conteudo."></p:tooltip>
				<!-- 					<h:outputText styleClass="float-left text-success" style="position:fixed;top:117px;left:15px; font-size:10px" value="0%"></h:outputText> -->
				<!-- 					<h:outputText styleClass="float-right text-success" style="position:fixed;top:117px; font-size:10px" value="50%"></h:outputText> -->
			</h:panelGroup>
			<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>
		</h:form>
	</ui:define>
	<ui:define name="conteudo">
		<h:form prependId="false" id="form">
			<h:panelGroup id="panelGrafico">
				<ui:include src="../visaoAdministrativo/ead/grafico.xhtml" />
			</h:panelGroup>
			<p:remoteCommand name="realizarScrollMenu" oncomplete="#{ConteudoControle.scrollMenu}"></p:remoteCommand>
			<script type="text/javascript" charset="UTF-8">
				(function($) {
					$(document).ready(function() {
						realizarScrollMenu();
					});
				}(jQuery));
			</script>
			<h:panelGroup id="naoExisteConteudoCadastro" rendered="#{ConteudoControle.naoExisteConteudoCadastrado}" layout="block" styleClass="col-md-12 mt50 text-center">
				<h:outputText styleClass="mensagemDetalhada fs20" value="#{msg.msg_Conteudo_naoCadastrado}" />
			</h:panelGroup>
			<h:panelGroup id="dadosConteudo" rendered="#{!ConteudoControle.naoExisteConteudoCadastrado}" layout="block" styleClass="w-100 pn panelConteudoCentral #{!ConteudoControle.maximizarTelaGeralConteudo ? 'panelConteudoCentralMaximizado' : ''}">
				<!-- 											<h:panelGroup layout="block" style="float:right; position:relative; top:0px;"> -->
				<!-- 												<otm:commandIcon id="minimizarTelaGeracaoConteudo" oncomplete="removeClass('#contentPopup','tabConteudoCentralMaximizado'); " update="form, formCss" icon="fas fa-window-minimize fs14" rendered="#{!ConteudoControle.maximizarTelaGeralConteudo}" action="#{ConteudoControle.realizarMaximizacaoTelaGeralConteudo}" /> -->
				<!-- 												<otm:commandIcon id="maximizarTelaGeracaoConteudo" oncomplete="addClass('#contentPopup','tabConteudoCentralMaximizado');" update="form, formCss" icon="fas fa-window-maximize fs14" rendered="#{ConteudoControle.maximizarTelaGeralConteudo}" action="#{ConteudoControle.realizarMaximizacaoTelaGeralConteudo}" /> -->
				<!-- 											</h:panelGroup> -->

				<h:panelGroup id="conteudo" style="width:100%;" layout="block" styleClass="w-100">
					<h:panelGroup layout="block" id="textoHtml" rendered="#{ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'TEXTO_HTML'}" styleClass="w-100">
						<otm:editor readonly="true" id="htmlPagina" value="#{ConteudoControle.conteudoUnidadePagina.texto}" theme="transparent" />
					</h:panelGroup>
					<h:outputText style="display:block;width:100%;text-align:center;height:calc(100vh - 200px) !important" styleClass="w-100" id="flashImagemVideoUrlAudio" escape="false" rendered="#{ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'FLASH' or ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'VIDEO_URL' or ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'AUDIO'}" value="#{ConteudoControle.caminhoArquivoConteudoUnidadePagina}" />
					<h:graphicImage styleClass="w-100" style="display: block !important;margin:0 auto;text-align:center;vertical-align:middle" id="imagemConteudo" rendered="#{!empty ConteudoControle.conteudoUnidadePagina.caminhoBaseRepositorio and ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'IMAGEM'}" url="#{ConteudoControle.caminhoArquivoConteudoUnidadePagina}" />
					<h:panelGroup id="grafico" styleClass="w-100" layout="block" rendered="#{ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'GRAFICO'}">
						<script type="text/javascript" charset="UTF-8">
							jQuery.noConflict();
							$(document).ready(
									function() {
										definirGraficoApresentar(
												'graficoGerado', 'true');
									});
						</script>
						<h:panelGroup id="graficoGerado" layout="block" styleClass="w-100 text-center" style="height:calc(100vh - 200px)">
						</h:panelGroup>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="w-100 text-center pn" rendered="#{ConteudoControle.conteudoUnidadePagina.tipoRecursoEducacional eq 'SLIDE_IMAGEM'}">
						<h:outputText escape="false" id="bxslider" style="display:block;min-height:calc(100vh - 200px);" value="#{ConteudoControle.caminhoArquivoConteudoUnidadePagina}" />
						<script type="text/javascript" charset="UTF-8">
							$(document).ready(function() {
								iniciarBanner();
							});

							iniciarBanner = function() {
								$('#form\\:bxslider')
										.bxSlider(
												{
													auto : true,
													captions : false,
													mode : 'fade',
													pagerType : 'short',
													pager : false,
													adaptiveHeight : true,
													responsive : true,
													video : false,
													nextText : '<i class="fa fa-angle-right fs16" ></i>',
													prevText : '<i class="fa fa-angle-left fs16" ></i>'
												});
							};
						</script>
					</h:panelGroup>


				</h:panelGroup>


			</h:panelGroup>
			<ui:include src="/visaoAluno/conteudoAlunoCons.xhtml"></ui:include>
			<h:panelGroup layout="block" rendered="#{!ConteudoControle.naoExisteConteudoCadastrado}" styleClass="#{ConteudoControle.styleClassPanelBotoesConteudoAluno}">
				<p:commandLink style="z-index:2006" oncomplete="#{ConteudoControle.executarScriptRecursoEducacionalConteudo}" styleClass="iconeBotoes bg-dark border shadow" update="formSubTituloPagina, formCss, form">
					<f:setPropertyActionListener value="#{ConteudoControle.conteudo.apresentarBotoes ? false : true}" target="#{ConteudoControle.conteudo.apresentarBotoes}" />
					<i class="#{ConteudoControle.conteudo.apresentarBotoes ? 'fas fa-caret-down' : 'fas fa-caret-up'} fs22 text-white" />
					<p:tooltip value="#{ConteudoControle.conteudo.apresentarBotoes ? 'Minimizar Botões' : 'Visualizar Botões'}" zindex="10000" />
				</p:commandLink>
				<h:panelGroup id="btns" rendered="#{ConteudoControle.conteudo.apresentarBotoes}">
					<h:panelGroup styleClass="float-left">
						<p:commandLink id="btnLogout" rendered="#{!ConteudoControle.emularAcessoAluno and !ConteudoControle.emularAcessoProfessor}" title="Voltar Página Inicial" action="#{VisaoAlunoControle.inicializarTelaInicialVisaoEstudoOnline}" styleClass="ml5 btn btn-info">
							<i class="fas fa-angle-double-left  mr5 mt5"></i>
							<h:outputText styleClass="mt3" value="Voltar Página Inicial" />
							<p:tooltip value="Voltar Página Inicial (alt+x)" />
						</p:commandLink>
						<p:commandLink id="btnVoltarPIEA" rendered="#{ConteudoControle.emularAcessoAluno or ConteudoControle.emularAcessoProfessor}" action="#{ConteudoControle.voltarEmularConteudo}" styleClass="ml5 btn btn-primary">
							<i class="fas fa-chevron-left  mr5 mt5"></i>
							<h:outputText styleClass="mt3" value="Voltar Página Inicial" />
						</p:commandLink>
		
						<p:commandLink rendered="#{ConteudoControle.existePaginaAnterior}" process="@form" oncomplete="#{ConteudoControle.acaoModalRecursoEducacional};#{ConteudoControle.executarScriptRecursoEducacionalConteudo};realizarScrollMenu();" action="#{ConteudoControle.visualizarPaginaAnterior}" update="formAddRecursoEducacional, form, formMensagem, formCss, formSubTituloPagina" styleClass="ml5 btn btn-info">
							<i class="fas fa-chevron-left  mr5 mt5"></i>
							<h:outputText styleClass="mt3" value="#{ConteudoControle.conteudoUnidadePagina.labelIconeVoltar}" />
						</p:commandLink>
					</h:panelGroup>

					<p:commandLink process="@form" oncomplete="#{ConteudoControle.acaoModalRecursoEducacional}; #{ConteudoControle.modalMensagemAvisoAluno}; #{ConteudoControle.executarScriptRecursoEducacionalConteudo};realizarScrollMenu();" action="#{ConteudoControle.inicializarApresentacaoGatilhoPosterior}" update="formAddRecursoEducacional, form, formMensagem, formCss, formSubTituloPagina" styleClass="float-right  btn btn-info btnAvancar">	
						<h:outputText styleClass="mt3" value="#{ConteudoControle.conteudoUnidadePagina.labelIconeAvancar}" />
						<i class="fas fa-chevron-right ml5 fs14  mt5"></i>
						<h:outputText styleClass="ml5 mt3" rendered="#{ConteudoControle.conteudoUnidadePagina.ponto> 0}" value="(+#{ConteudoControle.conteudoUnidadePagina.ponto}pt)" />	
					</p:commandLink>
				</h:panelGroup>
			</h:panelGroup>
		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
	</ui:define>

	<ui:define name="modal">
		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado50" id="panelTerminoConteudo" widgetVar="panelTerminoConteudo" domElementAttachment="parent"  width="350" height="100" zindex="1000">
			<h:form prependId="false" id="formTerminoConteudo">
				<h:panelGroup layout="block" style="width:100%, height:200px; text-align:center;margin-top:10px">
					<h:outputText style="color:gray" styleClass="field control-label tituloCampos fs22" value="#{msg.msg_Conteudo_finalizacaoEstudo}">

					</h:outputText>
				</h:panelGroup>
				<h:panelGroup layout="block" style="width:100%, height:100px; text-align:center;margin-top:30px">
					<otm:commandButton rendered="#{!ConteudoControle.emularAcessoAluno and !ConteudoControle.emularAcessoProfessor}" action="#{VisaoAlunoControle.inicializarTelaInicialVisaoEstudoOnline}" styleClass="btn btn-primary dark btn-fechar" value="Fechar" />
					<otm:commandButton rendered="#{ConteudoControle.emularAcessoAluno or ConteudoControle.emularAcessoProfessor}" oncomplete="PF('panelTerminoConteudo').hide();" styleClass="btn btn-primary dark btn-fechar" value="Fechar" />
				</h:panelGroup>
				<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>
			</h:form>
		</p:dialog>

		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado50" id="panelForumInteracaoResponder" widgetVar="panelForumInteracaoResponder" domElementAttachment="parent" autosized="false"  width="750" height="500" onShow="document.getElementById('interacaoRespostaComentario').focus();" zindex="1500">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="#{msg_aplic.prt_Forum_reponderComentario }" />
				</h:panelGroup>
			</f:facet>
			<h:form prependId="false" id="formForumInteracaoResponder">
				<style>
					#panelForumInteracaoResponder_container { #{ConteudoControle
						.backgroundRecursoEducacional
						
					}
					}
				</style>
				<script type="text/javascript" charset="utf-8">
					(function($) {
						$(document)
								.ready(
										function() {
											$(
													'#panelForumInteracaoResponder_content')
													.css('height',
															'calc(100% - 50px)');
											$('#formForumInteracaoResponder')
													.css('height', 'calc(100%)');
											$(".interacaoForumResposta")
													.watermark(
															"Digite seu comentário aqui e clique em responder");

										});
					}(jQuery));
				</script>
					
					
				<h:inputTextarea id="interacaoRespostaComentario" style="height:calc(100%)" styleClass="form-control interacaoForumResposta" value="#{ConteudoControle.forumInteracaoFilho.interacao}" />

				<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-50">
					<otm:commandButton id="responderComentario" value="Responder" icon="#{msg_botoes.btn_icon_enviar_email_embutido}" oncomplete="PF('panelForumInteracaoResponder').hide(); PF('panelAddRecursoEducacional').show();" action="#{ConteudoControle.persistirRespostaForumInteracao}" styleClass="btn btn-info" update="formAddRecursoEducacional" />
					<otm:spacer width="20px" />
					<otm:commandButton id="cancelarResponderComentario" value="Cancelar" styleClass="btn btn-danger light btn-cancelar" icon="#{msg_botoes.btn_icon_cancelar_embutido}" oncomplete="PF('panelForumInteracaoResponder').hide(); PF('panelAddRecursoEducacional').show();" immediate="true" update="formAddRecursoEducacional" />
				</h:panelGroup>

				<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>
			</h:form>
		</p:dialog>

		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="#{ConteudoControle.maximizarTela ? 'modalMaximizado100' : 'modalMaximizado'}" onShow="executarScriptsREA()" id="panelAddRecursoEducacional" widgetVar="panelAddRecursoEducacional" headerClass="headerPanelRecursoEducacional" visible="#{ConteudoControle.apresentarGatilho}" domElementAttachment="parent" autosized="false" >
			<h:form prependId="false" id="formAddRecursoEducacional">
				<p:remoteCommand update="formAddRecursoEducacional" name="executarScriptsREA" oncomplete="#{ConteudoControle.executarScriptRecursoEducacionalGatilho}"></p:remoteCommand>
				<style>
					#panelAddRecursoEducacional_container { #{ConteudoControle
						.backgroundRecursoEducacional
						
					}
					
					}
					#panelAddRecursoEducacional_content_scroller {
						position: relative !important;
						top: 31px !important;
						height: calc(100% - 64px) !important;
					}
					
					#panelAddRecursoEducacional_container {
						height: 100% !important;
						padding: 0px !important;
						height: calc(100%) !important;
					}
				</style>
				<h:panelGroup id="conteudoRE" layout="block" styleClass="row">
					<h:panelGroup styleClass="#{ConteudoControle.maximizarTela ? 'barra-btn-flutuante-topo-modal-100' : 'barra-btn-flutuante-topo-modal-80'}" layout="block">
						<h:panelGroup layout="block" style="text-align:left; display:block;  position:relative; top:5px;">
							<h:outputText value="#{ConteudoControle.conteudoUnidadePaginaRecursoEducacional.titulo}" />
						</h:panelGroup>
						<h:panelGroup layout="block" style="float:right; position:relative; top:-11px;">
							<otm:commandIcon id="minimizarRE" icon="fas fa-window-minimize fs14" styleIcon="position: relative;    top: -3px;" update="panelAddRecursoEducacional" action="#{ConteudoControle.restauraValorPadraoPanelRecursoEducacional}" oncomplete="PF('panelAddRecursoEducacional').hide();PF('panelAddRecursoEducacional').show();" rendered="#{ConteudoControle.maximizarTela}" />
							<otm:spacer width="5px" />
							<otm:commandIcon id="maximizarRE" icon="far fa-window-maximize fs14" update="panelAddRecursoEducacional" action="#{ConteudoControle.maximizarPanelRecursoEducacional}" oncomplete="PF('panelAddRecursoEducacional').hide();PF('panelAddRecursoEducacional').show();" rendered="#{!ConteudoControle.maximizarTela}" />
							<otm:spacer width="5px" />
							<otm:commandIcon id="closeRE" rendered="#{ConteudoControle.apresentarOpcaoFecharGatilho or ConteudoControle.conteudoUnidadePaginaRecursoEducacional.momentoApresentacaoRecursoEducacional eq 'APOIO_PROFESSOR' or ConteudoControle.emulandoAcessoPagina or ConteudoControle.emularAcessoAluno}" icon="#{msg_botoes.btn_icon_fechar_embutido} fs14" update="conteudoRE" action="#{ConteudoControle.fecharModalRecursoEducacional}" oncomplete="PF('panelAddRecursoEducacional').hide()" />
						</h:panelGroup>

					</h:panelGroup>
					<h:panelGroup id="conteudoREGeral" layout="block" styleClass="row">
