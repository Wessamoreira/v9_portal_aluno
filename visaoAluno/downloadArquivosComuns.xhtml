<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui" xmlns:h="http://java.sun.com/jsf/html"
 xmlns:f="http://java.sun.com/jsf/core"
 xmlns:ui="http://java.sun.com/jsf/facelets"   xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br">
<h:head>
</h:head>
<ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="tituloPagina">
		<h:outputText  value="Download de Arquivos" />
	</ui:define>
	<ui:define name="conteudo">
		<p:dialog styleClass="modalMaximizado" id="panelPreviewAnexo" widgetVar="panelPreviewAnexo" closeOnScape="true" resizeable="true" width="800" height="600" domElementAttachment="parent" autosized="false" shadowOpacity="true" top="10">
			<f:facet name="header">
				<h:outputText styleClass="field control-label tituloCampos" value="Visualizar Anexo"></h:outputText>
			</f:facet>
			<h:form id="formPreviewAnexo">
				<h:panelGroup layout="block" styleClass="row">

					<h:panelGroup layout="block" rendered="#{!empty ArquivoControle.caminhoPreview and ArquivoControle.caminhoPreviewTipoPdf}" style="margin-top: 15px" styleClass="col-md-12 text-center">
						<otm:pdfView id="pdfAnexoPDF" toolbar="1" data="#{ArquivoControle.caminhoPreview}" />
					</h:panelGroup>
					
					<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-80">

						<otm:commandButton id="btnFecharAnexo" value="Fechar" icon="#{msg_botoes.btn_icon_fechar_embutido}" styleClass="btn btn-danger" style="margin-left: 5px" update="form" oncomplete="PF('panelPreviewAnexo').hide();" />
						

					</h:panelGroup>
				</h:panelGroup>
			</h:form>
		</p:dialog>

<!-- 			<ui:include src="./richPanelImagem.xhtml" /> -->
		<h:form prependId="false" id="form">
			<h:panelGroup id="downloadArquivo" layout="block" styleClass="row">
				<h:panelGroup id="arquivosInst" layout="block" styleClass="col-md-12">
					<h:outputText styleClass="field control-label tituloCamposNegrito" value="Arquivos anexados pela Instituição" />
					<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false"  id="arquivos3" width="100%" headerClass="consulta" styleClass="tabConsulta" rowClasses="linhaImpar, linhaPar" columnClasses="colunaEsquerda" rendered="#{not empty ArquivoControle.listaArquivos}" value="#{ArquivoControle.listaArquivos}" var="arquivoItens">
						<p:column style="text-align: center !important">
							<f:facet name="header">
								<h:outputText value="Descrição" style="campos" />
							</f:facet>
							<h:outputLabel value="#{arquivoItens.descricaoArquivo_Apresentar}" />
						</p:column>
						<p:column style="text-align: center !important">
							<f:facet name="header">
								<h:outputText value="Data Upload" style="campos" />
							</f:facet>
							<h:outputLabel value="#{arquivoItens.dataUpload_Apresentar}" />
						</p:column>
						<p:column style="text-align: center !important">
							<f:facet name="header">
								<h:outputText value="#{msg_botoes.btn_opcoes}" />
							</f:facet>

							<otm:commandIcon id="ArquivoParaDownload" tooltip="Download" icon="#{msg_botoes.btn_icon_download} iconePequeno" oncomplete="#{arquivoItens.servidorArquivoOnline eq 'APACHE'} ? location.href='../DownloadSV' : abrirPopup('../DownloadSV', 'DownloadSV_#{arquivoItens.codigo}',950,595)" title="Download Arquivo"  action="#{ArquivoControle.realizarDownloadArquivo(arquivoItens)}" />
							<otm:commandIcon icon="fas fa-eye btn-white btn-primary iconePequeno" oncomplete="PF('panelPreviewAnexo').show();" update="formPreviewAnexo" tooltip="Visualizar Arquivo" action="#{ArquivoControle.realizarVisualizacaoPreview(arquivoItens)}" rendered="#{arquivoItens.isPdF}" />
<!-- 									<h:panelGroup> -->
<!-- 										<h:outputLink title="Download" value="#{ArquivoControle.caminhoServidorDownloadArquivosComuns}"> -->
<!-- 											<h:graphicImage styleClass="botoes" value="#{resource['imagens/botaoDownload.png']}" /> -->
<!-- 										</h:outputLink> -->
<!-- 									</h:panelGroup> -->
						</p:column>
					</p:dataTable>
				<h:panelGroup columns="1" id="dlMsg" width="100%" columnClasses="colunaEsquerda">
					<h:outputText styleClass="mensagem" value="#{ArquivoControle.mensagem}" />
					<h:panelGroup columns="2" styleClass="middle">
						<h:outputText styleClass="mensagemDetalhada" value="#{ArquivoControle.mensagemDetalhada}" />
					</h:panelGroup>
					<h:panelGroup columns="1" width="100%" columnClasses="colunaCentralizada">
					</h:panelGroup>
				</h:panelGroup>
			</h:panelGroup>
		</h:panelGroup>
	<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>

	</ui:define>
</ui:composition>
</html>
