<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui" xmlns:h="http://java.sun.com/jsf/html"
 xmlns:f="http://java.sun.com/jsf/core"
 xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br" >
<h:head>
</h:head>
<ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<f:metadata>
    <f:event type="preRenderView" listener="#{VisaoAlunoControle.executarAtualizacaoAutomaticaDocumentacaoMatriculaPortal}" />
	</f:metadata>
	<ui:define name="tituloPagina">
		<h:outputText value="Documentos Entregues" />
	</ui:define>
	<ui:define name="conteudo">
		<h:outputScript src="resource:///jquery.js" />
		<h:outputScript name="jquery.color.js" library="script/crop" />
		<h:outputScript name="jquery.Jcrop.js" library="script/crop" />
		<h:outputStylesheet name="jquery.Jcrop.css" library="script/crop" />
		<h:outputScript name="webcam.js" library="script/webcam" />
		<script>
			(function($) {
				clickUpload = function(idPanel) {
					var input = $(idPanel).find("input:file");
					$(input).click();
				};

				iniciarCropFrente = function() {
					$("#formImagemDocumentosEntregues\\:image").Jcrop({
						onSelect : showCoordsFrente,
						onChange : showCoordsFrente,
						bgColor : 'black',
						bgOpacity : .3,
					});
				};

				function showCoordsFrente(c) {
					var valorX = document
							.getElementById('x');
					valorX.value = c.x;
					var valorY = document
							.getElementById('y');
					valorY.value = c.y;
					var valorW = document
							.getElementById('w');
					valorW.value = c.w;
					var valorH = document
							.getElementById('h');
					valorH.value = c.h;
				}
				;

				iniciarCropVerso = function() {
					$("#formImagemVerso\\:imageVerso").Jcrop({
						onSelect : showCoordsVerso,
						onChange : showCoordsVerso,
						bgColor : 'black',
						bgOpacity : .3,
					});
				};

				function showCoordsVerso(c) {
					var valorX = document
							.getElementById('xVerso');
					valorX.value = c.x;
					var valorY = document
							.getElementById('yVerso');
					valorY.value = c.y;
					var valorW = document
							.getElementById('wVerso');
					valorW.value = c.w;
					var valorH = document
							.getElementById('hVerso');
					valorH.value = c.h;
				}
				;

			})(jQuery);
		</script>
		
		<style>
			.btn-disabledUpload {
				color: #b3afaf !important;
			}
			.background-upload {
				background-color: rgba(158, 158, 158, 0.185) !important;
			}
		</style>

		<h:form prependId="false" id="form">
			<h:panelGroup id="entregaDocumento" layout="block" styleClass="row">
				<h:panelGroup layout="block" styleClass="row">
					<h:panelGroup layout="block" styleClass="col-md-3 text-center">
						<otm2:panel name="panel1" renderedControl="false" styleClassHeader="bg-success p5 rounded-top" stylePanelHeader=" " styleClassFooter="dn" stylePanel="min-height: 90px; border: 1px solid #1cc88a !important;">
							<ui:define name="header">
								<h:outputText styleClass="tituloCamposResultado text-white" value="Entregue" />
							</ui:define>
							<ui:define name="body">
								<span style="color: green;" id="documentoEntregue" class="#{msg_botoes.btn_icon_selecionar_embutido} fa-w-2" />
							</ui:define>
						</otm2:panel>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-3 text-center">
						<otm2:panel name="panel2" renderedControl="false" styleClassHeader="bg-primary p5 rounded-top" stylePanelHeader=" " styleClassFooter="dn" stylePanel="min-height: 90px; border: 1px solid #4e73df !important;">
							<ui:define name="header">
								<h:outputText styleClass="tituloCamposResultado text-white" value="Pendente" />
							</ui:define>
							<ui:define name="body">
								<span id="documentoPendente" style="color: darkblue; margin-left: 15px" class="#{msg_botoes.btn_icon_aviso2} " />
							</ui:define>
						</otm2:panel>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-3 text-center">
						<otm2:panel name="panel3" renderedControl="false" styleClassHeader="bg-warning p5 rounded-top" stylePanelHeader=" " styleClassFooter="dn" stylePanel="min-height: 90px; border: 1px solid #f6c23e !important">
							<ui:define name="header">
								<h:outputText styleClass="tituloCamposResultado text-white" value="Pendente Aprovação" />
							</ui:define>
							<ui:define name="body">
								<span style="color: orange; margin-left: 15px" id="documentoPendenteAprovacao" class="#{msg_botoes.btn_icon_aviso_embutido} " />
							</ui:define>
						</otm2:panel>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-3 text-center">
						<otm2:panel name="panel4" renderedControl="false" styleClassHeader="bg-danger p5 rounded-top" stylePanelHeader=" " styleClassFooter="dn" stylePanel="min-height: 90px; border: 1px solid #e74a3b !important;">
							<ui:define name="header">
								<h:outputText styleClass="tituloCamposResultado text-white" value="Documento Rejeitado" />
							</ui:define>
							<ui:define name="body">
								<span style="color: red; margin-left: 15px" id="documentoRejeitado" class="#{msg_botoes.btn_icon_cancelar_embutido} " />
							</ui:define>
						</otm2:panel>
					</h:panelGroup>
				</h:panelGroup>
				<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false"  id="documetacaoMatriculaVO" style="margin-top: 15px" width="100%" headerClass="consulta" rowClasses="linhaImparSubordinado, linhaParSubordinado"  value="#{VisaoAlunoControle.documetacaoMatriculaVOS}" var="documetacaoMatriculaItens" rendered="#{!empty VisaoAlunoControle.documetacaoMatriculaVOS}">
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_DocumetacaoMatricula_tipoDocumento}" />
						</f:facet>
						<h:outputText value="#{documetacaoMatriculaItens.tipoDeDocumentoVO.nome} - #{documetacaoMatriculaItens.ano}/#{documetacaoMatriculaItens.semestre}" rendered="#{documetacaoMatriculaItens.ano != '' and documetacaoMatriculaItens.semestre != ''}" />
						<h:outputText value="#{documetacaoMatriculaItens.tipoDeDocumentoVO.nome}" rendered="#{documetacaoMatriculaItens.ano == '' and documetacaoMatriculaItens.semestre == ''}" />
						<h:outputText value="#{documetacaoMatriculaItens.tipoDeDocumentoVO.nome} -  #{documetacaoMatriculaItens.ano}" rendered="#{documetacaoMatriculaItens.ano != '' and documetacaoMatriculaItens.semestre == ''}" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_DocumetacaoMatricula_dataEntrega}" />
						</f:facet>
						<h:outputText value="#{documetacaoMatriculaItens.dataEntrega}">
							<f:convertDateTime pattern="dd/MM/yyyy" />
						</h:outputText>
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_DocumetacaoMatricula_entregue}" />
						</f:facet>
						<h:panelGroup id="documentoEntregue1" rendered="#{documetacaoMatriculaItens.entregue}">
							<span style="color: green" class="#{msg_botoes.btn_icon_selecionar_embutido} iconePequeno" />
						</h:panelGroup>
						<p:tooltip value="Entregue" for="documentoEntregue1" />
						<h:panelGroup id="documentoPendente2" rendered="#{!documetacaoMatriculaItens.entregue and !documetacaoMatriculaItens.arquivoAprovadoPeloDep and !documetacaoMatriculaItens.isPossuiArquivo and documetacaoMatriculaItens.dataNegarDocDep == null}">
							<span style="color: darkblue" class="#{msg_botoes.btn_icon_aviso2} iconePequeno" />
						</h:panelGroup>
						<p:tooltip value="Documento Pendente" for="documentoPendente2" />
						<h:panelGroup id="documentoPendenteAprovacao2" rendered="#{!documetacaoMatriculaItens.entregue and !documetacaoMatriculaItens.arquivoAprovadoPeloDep and documetacaoMatriculaItens.isPossuiArquivo and documetacaoMatriculaItens.dataNegarDocDep == null}">
							<span style="color: orange" class="#{msg_botoes.btn_icon_aviso_embutido} iconePequeno" />
						</h:panelGroup>
						<p:tooltip value="Documento Pendente de Aprovação" for="documentoPendenteAprovacao2" />
						<h:panelGroup id="documentoRejeitado2" rendered="#{!documetacaoMatriculaItens.entregue and documetacaoMatriculaItens.dataNegarDocDep != null}">
							<span style="color: red" class="#{msg_botoes.btn_icon_cancelar_embutido} iconePequeno" />
						</h:panelGroup>
						<p:tooltip value="Documento Rejeitado" for="documentoRejeitado2" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_DocumetacaoMatricula_motivoIndeferimento}" />
						</f:facet>
						<h:outputText value="#{documetacaoMatriculaItens.justificativaNegacao}" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="Arquivo Frente" />
						</f:facet>
						<h:panelGroup>
							<h:panelGroup rendered="#{VisaoAlunoControle.permitirUploadAnexo}">
								<otm:commandIcon update="formUplod" oncomplete="PF('panelUpload').show();" rendered="#{!documetacaoMatriculaItens.entregue and documetacaoMatriculaItens.tipoDeDocumentoVO.permitirPostagemPortalAluno and !documetacaoMatriculaItens.isPossuiArquivoAssinado}" action="#{VisaoAlunoControle.selecionarObjetoDocumentacaoMatricula}" title="Upload Documento" icon="#{msg_botoes.btn_icon_upload} iconePequeno" disabled="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo}" tooltip="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo ? 'Para realizar o upload do arquivo frente deve-se excluir a documentação antiga do aluno' : 'Upload Documento Frente'}" styleClassIcon="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo ? 'background-upload btn-disabledUpload' : ''}" />
							</h:panelGroup>
							<otm:commandIcon id="dwl" oncomplete="#{documetacaoMatriculaItens.arquivoVO.servidorArquivoOnline eq 'APACHE'} ? location.href='../DownloadSV' : abrirPopup('../DownloadSV', 'DownloadSV_#{documetacaoMatriculaItens.codigo}',950,595)" rendered="#{documetacaoMatriculaItens.isPossuiArquivo}" tooltip="Download Arquivo" icon="#{msg_botoes.btn_icon_download} iconePequeno" action="#{VisaoAlunoControle.realizarDownloadArquivo(documetacaoMatriculaItens.arquivoVO, true)}" />
							<h:panelGroup rendered="#{VisaoAlunoControle.permitirUploadAnexo}">
								<otm:commandIcon update="documetacaoMatriculaVO" rendered="#{!documetacaoMatriculaItens.entregue and documetacaoMatriculaItens.tipoDeDocumentoVO.permitirPostagemPortalAluno and !documetacaoMatriculaItens.isPossuiArquivoAssinado and documetacaoMatriculaItens.isPossuiArquivo}" action="#{VisaoAlunoControle.removerDocumentacaoMatriculaFrente}" tooltip="Remover Arquivo" icon="#{msg_botoes.btn_icon_remover} iconePequeno" />
							</h:panelGroup>
							<otm:commandIcon id="previewFrente" oncomplete="PF('panelPreview').show();" update="formPreview" rendered="#{documetacaoMatriculaItens.isPossuiArquivo and (documetacaoMatriculaItens.arquivoVO.isPdF or documetacaoMatriculaItens.arquivoVO.isImagem)}" tooltip="Visualizar Arquivo" icon="#{msg_botoes.btn_icon_lupa} iconePequeno" action="#{VisaoAlunoControle.realizarVisualizacaoPreview(documetacaoMatriculaItens.arquivoVO)}" />
						</h:panelGroup>
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="Arquivo Verso" />
						</f:facet>
						<h:panelGroup>
							<h:panelGroup rendered="#{VisaoAlunoControle.permitirUploadAnexo}">
								<otm:commandIcon update="formUploadVerso" oncomplete="PF('panelUploadVerso').show(); PF('panelUploadVerso').show();" rendered="#{!documetacaoMatriculaItens.entregue and documetacaoMatriculaItens.tipoDeDocumentoVO.permitirPostagemPortalAluno and documetacaoMatriculaItens.tipoDeDocumentoVO.documentoFrenteVerso and !documetacaoMatriculaItens.isPossuiArquivoAssinado and documetacaoMatriculaItens.isPossuiArquivo}" action="#{VisaoAlunoControle.selecionarDocumentacaoMatriculaVerso}" icon="#{msg_botoes.btn_icon_upload} iconePequeno" disabled="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo}" tooltip="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo ? 'Para realizar o upload do arquivo verso deve-se excluir a documentação antiga do aluno' : 'Upload Documento Verso'}" styleClassIcon="#{documetacaoMatriculaItens.desabilitarBotaoUparArquivo ? 'background-upload btn-disabledUpload' : ''}" />
							</h:panelGroup>
							<otm:commandIcon id="dwl2" oncomplete="#{documetacaoMatriculaItens.arquivoVOVerso.servidorArquivoOnline eq 'APACHE'} ? location.href='../DownloadSV' : abrirPopup('../DownloadSV', 'DownloadSV_#{documetacaoMatriculaItens.codigo}',950,595)" rendered="#{documetacaoMatriculaItens.isPossuiArquivoVerso and documetacaoMatriculaItens.tipoDeDocumentoVO.documentoFrenteVerso}" tooltip="Download Arquivo Verso" action="#{VisaoAlunoControle.realizarDownloadArquivo(documetacaoMatriculaItens.arquivoVOVerso, true)}" icon="#{msg_botoes.btn_icon_download} iconePequeno" />
							<h:panelGroup rendered="#{VisaoAlunoControle.permitirUploadAnexo}">
								<otm:commandIcon update="documetacaoMatriculaVO" rendered="#{!documetacaoMatriculaItens.entregue and documetacaoMatriculaItens.tipoDeDocumentoVO.permitirPostagemPortalAluno and documetacaoMatriculaItens.tipoDeDocumentoVO.documentoFrenteVerso and !documetacaoMatriculaItens.isPossuiArquivoAssinado and documetacaoMatriculaItens.isPossuiArquivo and documetacaoMatriculaItens.isPossuiArquivoVerso}" action="#{VisaoAlunoControle.removerDocumentacaoMatriculaVerso}" tooltip="Remover Arquivo" icon="#{msg_botoes.btn_icon_remover} iconePequeno" />
							</h:panelGroup>
							<otm:commandIcon id="previewVerso" oncomplete="PF('panelPreview').show();" update="formPreview" rendered="#{documetacaoMatriculaItens.isPossuiArquivoVerso and (documetacaoMatriculaItens.arquivoVOVerso.isPdF or documetacaoMatriculaItens.arquivoVOVerso.isImagem)}" tooltip="Visualizar Arquivo" icon="#{msg_botoes.btn_icon_lupa} iconePequeno" action="#{VisaoAlunoControle.realizarVisualizacaoPreview(documetacaoMatriculaItens.arquivoVOVerso)}" />
						</h:panelGroup>
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="Arquivo Assinado/Ged" />
						</f:facet>
						<otm:commandIcon id="dwl5" oncomplete="#{documetacaoMatriculaItens.arquivoVOAssinado.servidorArquivoOnline eq 'APACHE'} ? location.href='../DownloadSV' : abrirPopup('../DownloadSV', 'DownloadSV_#{documetacaoMatriculaItens.codigo}',950,595)" title="Download Arquivo Assinado" styleClass="botoes" icon="#{msg_botoes.btn_icon_download} iconePequeno" action="#{DocumetacaoMatriculaControle.realizarDownloadArquivo(documetacaoMatriculaItens.arquivoVOAssinado)}" rendered="#{documetacaoMatriculaItens.isPossuiArquivoAssinado and documetacaoMatriculaItens.arquivoGED.codigo eq 0}" />						
						<otm:commandIcon id="previewAssinado" oncomplete="PF('panelPreview').show();" update="formPreview" rendered="#{documetacaoMatriculaItens.isPossuiArquivoAssinado and documetacaoMatriculaItens.arquivoGED.codigo ne 0 and (documetacaoMatriculaItens.arquivoVOAssinado.isPdF or documetacaoMatriculaItens.arquivoVOAssinado.isImagem)}" tooltip="Visualizar Arquivo Assinado" icon="#{msg_botoes.btn_icon_lupa} iconePequeno" action="#{VisaoAlunoControle.realizarVisualizacaoPreview(documetacaoMatriculaItens.arquivoVOAssinado)}" />
						<otm:commandIcon id="dwlGed" oncomplete="#{documetacaoMatriculaItens.arquivoGED.servidorArquivoOnline eq 'APACHE'} ? location.href='../../DownloadSV' : abrirPopup('../../DownloadSV', 'DownloadSV_#{documetacaoMatriculaItens.codigo}',950,595)" rendered="#{documetacaoMatriculaItens.arquivoGED.codigo ne 0}" icon="#{msg_botoes.btn_icon_download} iconePequeno" tooltip="Download Arquivo GED" action="#{VisaoAlunoControle.realizarDownloadArquivo(documetacaoMatriculaItens.arquivoGED)}" />
						<otm:commandIcon id="previewGed1" oncomplete="PF('panelPreview').show();" update="formPreview" rendered="#{documetacaoMatriculaItens.arquivoGED.codigo ne 0 and (documetacaoMatriculaItens.arquivoGED.isPdF or documetacaoMatriculaItens.arquivoGED.isImagem)}" tooltip="Visualizar Arquivo GED" icon="#{msg_botoes.btn_icon_lupa} iconePequeno" action="#{VisaoAlunoControle.realizarVisualizacaoPreview(documetacaoMatriculaItens.arquivoGED)}" />
					</p:column>
				</p:dataTable>
				<h:panelGroup rendered="#{VisaoAlunoControle.permitirPostagemPortalAluno}">
					<h:panelGroup layout="block" styleClass="barraFlutuanteInferior">
						<otm:commandButton action="#{VisaoAlunoControle.gravarDocumentacaoMatricula}" value="#{msg_botoes.btn_gravar}" styleClass="btn btn-dark btn-gravar" id="btnGravar" tooltip="Gravar" update="form" />
					</h:panelGroup>
				</h:panelGroup>
				<h:panelGrid id="msg">
					<h:panelGroup layout="block" styleClass="row">
						<otm:mensagem bean="#{VisaoAlunoControle}" />
					</h:panelGroup>
				</h:panelGrid>
			</h:panelGroup>
			<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl>

		</h:form>
		
		<!--  INICIO TESTE   -->

		<h:form id="formGED" prependId="false">
			<h:panelGroup layout="block" styleClass="row" rendered="#{VisaoAlunoControle.apresentarDocumentacaoGED}">
				<h:panelGroup layout="block" style="width:100%; padding:30px 0 10px 0; text-align:start; border-bottom: 1px solid black">
					<h:outputText value="Documentação GED" styleClass="text-uppercase font-weight-bold"/>
				</h:panelGroup>
				<p:dataTable id="digitacoesGED" width="100%"
					headerClass="subordinado" styleClass="tabFormSubordinada"
					rowClasses="linhaImparSubordinado, linhaParSubordinado"
					columnClasses="colunaAlinhamento"
					value="#{VisaoAlunoControle.listaDocumentacaoGED}"
					var="documentacao">
					<p:column>
						<f:facet name="header">
							<h:outputText
								value="#{msg_aplic.prt_DocumetacaoMatricula_categoriaGED}" />
						</f:facet>
						<h:outputText value="#{documentacao.categoriaGED.descricao}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="Arquivo" />
						</f:facet>
						<h:outputText value="#{documentacao.arquivo.descricao}" />
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="Data" />
						</f:facet>
						<h:outputText value="#{documentacao.data}">
							<f:convertDateTime pattern="dd/MM/yyyy HH:mm"></f:convertDateTime>
						</h:outputText>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="Documentos" />
						</f:facet>
						<h:outputText value="#{documentacao.situacao}">
						</h:outputText>
						<h:commandLink rendered="#{!empty documentacao.mensagem}"
							id="helpMensagemErroDocumentacaoGED" disabled="true">
							<span class="#{msg_botoes.btn_icon_help} iconePequeno" />
							<p:tooltip rendered="#{!empty documentacao.mensagem}"
								followMouse="false" direction="topLeft"
								target="helpMensagemErroDocumentacaoGED">
								<h:outputText escape="false" value="#{documentacao.mensagem}" />
							</p:tooltip>
						</h:commandLink>
					</p:column>
					<p:column>
						<ui:repeat type="definitions" rowKeyVar="row2" style="width:100%; padding:0px !important; margin:0px !important" value="#{documentacao.listaTipoDocumentoGED}" var="tipoDocumentacao">
							<h:panelGrid cellpadding="0" cellspacing="0" columns="4" columnClasses="bordaDireita,bordaDireita, semBorda" style="width:100%;#{row2 ne 0 ? 'border-top:1px solid #C4C0C9;' : '' }">
								<h:panelGroup layout="block" style="width:200px; text-align:left;min-height:20px">
									<h:outputText value="#{tipoDocumentacao.tipoDocumento.nome}" />
								</h:panelGroup>
							</h:panelGrid>
						</ui:repeat>
					</p:column>
					<p:column>
						<f:facet name="header">
							<h:outputText value="#{msg_botoes.btn_opcoes}" />
						</f:facet>
						<otm:commandIcon id="dwl5"
							oncomplete="#{documentacao.arquivo.servidorArquivoOnline eq 'APACHE'} ? location.href='../DownloadSV' : abrirPopup('../DownloadSV', 'DownloadSV_GED_#{documentacao.arquivo.codigo}',950,595)"
							rendered="#{documentacao.arquivo.nome != ''}"
							tooltip="Download Arquivo"
							icon="#{msg_botoes.btn_icon_download} iconePequeno"
							action="#{VisaoAlunoControle.realizarDownloadArquivo(documentacao.arquivo)}" />
						<otm:commandIcon id="previewGed2"
							oncomplete="PF('panelPreview').show();" 
							update="formPreview"
							rendered="#{documentacao.arquivo.codigo ne 0 and (documentacao.arquivo.isPdF or documentacao.arquivo.isImagem)}"
