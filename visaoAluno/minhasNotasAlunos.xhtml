							</h:panelGroup>
						</p:column>
						<p:column id="colunaSituacaoReprovadas" width="5%" style="background-color: transparent;">

								<h:outputText id="situacaoLayoutReprovadas" value="Situação" />

		</p:dialog>

		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado" id="panelDetalhesNotas" widgetVar="panelDetalhesNotas"  width="850" minHeight="390" height="330" domElementAttachment="parent">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="Notas Detalhadas"></h:outputText>
				</h:panelGroup>
			</f:facet>
			<h:form prependId="false" id="formDetalhesNotas">

					<h:inputText value="#{MinhasNotasControle.historicoVO.disciplina.nome}" readonly="true" styleClass="form-control camposSomenteLeitura" />
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="col-md-2" rendered="#{MinhasNotasControle.historicoVO.apresentarSituacaoAplicandoRegraConfiguracaoAcademica and MinhasNotasControle.historicoVO.calendarioLancamentoNotaVO.apresentarCalculoMediaFinalVisaoAluno}">
					<h:outputText styleClass="tituloCampos" value="Situação" rendered="#{(MinhasNotasControle.historicoVO.mediaFinalConceito.codigo eq 0 and MinhasNotasControle.historicoVO.mediaFinal != null) or MinhasNotasControle.historicoVO.aprovado or MinhasNotasControle.historicoVO.emRecuperacao}" />
					<h:inputText value="#{MinhasNotasControle.historicoVO.situacao_Apresentar}" styleClass="form-control camposSomenteLeitura" readonly="true" rendered="#{(MinhasNotasControle.historicoVO.mediaFinalConceito.codigo eq 0 and MinhasNotasControle.historicoVO.mediaFinal != null) or MinhasNotasControle.historicoVO.aprovado or MinhasNotasControle.historicoVO.emRecuperacao}" />
				</h:panelGroup>
				<h:panelGroup layout="block" rendered="#{MinhasNotasControle.configuracaoAcademico.tipoApresentarFrequenciaVisaoAluno eq 'QT' and !MinhasNotasControle.historicoVO.ocultarFrequenciaFalta}" styleClass="col-md-1">

					<h:inputText value="#{MinhasNotasControle.historicoVO.totalFalta}" styleClass="form-control camposSomenteLeitura" readonly="true" />

					<h:inputText value="#{MinhasNotasControle.historicoVO.freguencia}(%)" styleClass="form-control camposSomenteLeitura" readonly="true" />

						</f:facet>

							<h:outputText value="Valor" />
						</f:facet>
						<h:outputText id="valorNota" value="#{historicoVONotas.valor}" style="text-align:center" />
					</p:column>
				</p:dataTable>
			<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
		</p:dialog>

		<p:dialog styleClass="modalMaximizado" id="panelNotasParciais" shadowOpacity="true" width="850" minHeight="390" height="330" >
			<f:facet name="header">
				<h:outputText value="Notas Parciais" />

			<h:form id="formNotasParciais">

							</f:facet>
							<h:outputText value="#{turmaHistoricoNotaParcialItens.turmaDisciplinaNotaParcial.tituloNota}" />
						</p:column>
						<p:column style="width: 20%">
							<f:facet name="header">
								<h:outputText value="Nota Parcial" />
							</f:facet>
							<h:outputText value="#{turmaHistoricoNotaParcialItens.nota}" />
						</p:column>
						<p:column>
							<f:facet name="header" style="width: 10%">
								<h:outputText value="Data" />
							</f:facet>
							<h:outputText id="dataAvaliacaoAluno" value="#{turmaHistoricoNotaParcialItens.turmaDisciplinaNotaParcial.dataAvaliacao}" disabled="true" >
								<f:convertDateTime pattern="dd/MM/yyyy" />
							</h:outputText>
						</p:column>
						<p:column rendered="#{MinhasNotasControle.exibirColunaPeso}">
							<f:facet name="header" style="width: 15%">
								<h:outputText value="#{msg_aplic.prt_NotaParcial_peso}" />
							</f:facet>
							<h:outputText id="pesoAluno" value="#{turmaHistoricoNotaParcialItens.turmaDisciplinaNotaParcial.peso}" />
						</p:column>
						<p:column>
							<f:facet name="header" style="width: 15%">
								<h:outputText value="#{msg_aplic.prt_NotaParcial_conteudo}" />

							<otm:outputHelp tooltip="#{turmaHistoricoNotaParcialItens.turmaDisciplinaNotaParcial.conteudoAvaliacao}" id="conteudoAvaliacaoLancamentoIndividual" />
						</p:column>
						<f:facet name="footer">
							<div style="text-align: center !important">
								<p:dataScroller align="center" for="formHistoricoNotaParcial:listaHistoricoNotaParcialItem" id="paginadorListaHistoricoNotaParcialItem" rendered="#{!empty LancamentoNotaControle.historicoNotaParcialVOs}" boundaryControls="auto" stepControls="auto" fastControls="hide" />
							</div>
						</f:facet>
					</p:dataTable>
				</h:panelGroup>
				<h:panelGroup styleClass="row" layout="block">
					<h:panelGroup styleClass="col-md-6" layout="block" rendered="#{MinhasNotasControle.apresentarCampoFormulaCalculoNotaParcial}">
						<h:outputText styleClass="field control-label tituloCampos" value="Fórmula Cálculo da Nota" />
						<h:inputText styleClass="form-control campos"  readonly="true" value="#{MinhasNotasControle.formulaCalculoNotaParcialApresentar}" />
					</h:panelGroup>
					<h:panelGroup styleClass="col-md-6" layout="block">
						<h:outputText styleClass="field control-label tituloCampos" value="Nota" />
						<h:inputText styleClass="form-control campos" readonly="true" value="#{MinhasNotasControle.historicoNotaVO.notaApresentar}"  />
					</h:panelGroup>
				</h:panelGroup>
			</h:form>
		</p:dialog>
	</ui:define>
