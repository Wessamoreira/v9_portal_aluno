<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns:ui="http://java.sun.com/jsf/facelets" xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui" xmlns:h="http://java.sun.com/jsf/html" xmlns:f="http://java.sun.com/jsf/core"
   xmlns:composite="http://java.sun.com/jsf/composite" xmlns:fn="http://java.sun.com/jsp/jstl/functions" xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br">
<composite:interface>
	<composite:attribute name="bean" required="true" type="java.lang.Object" />
</composite:interface>
<composite:implementation>
	<h:panelGroup id="TWITTER" style="order:#{bean.dashboardTwitter.ordem}" rendered="#{LoginControle.configuracaoGeralSistemaVO.apresentarCodigoTwitts and !bean.dashboardTwitter.ocultar}" styleClass="col-md-3" layout="block">
		<p:droppable dropValue="#{bean.dashboardTwitter}" update=":panelGeral" dropListener="#{bean.registrarPosicaoDashboard}" acceptedTypes="DASHBOARDS" />
		<p:draggable type="DASHBOARDS" dragIndicator="TWITTER_DRAG" dragValue="#{bean.dashboardTwitter}">
		</p:draggable>
		<otm2:dashpanel id="dashboardTwitter" styleClass="p-0" cols="12">
			<ui:define name="header">
				<i class="#{bean.dashboardTwitter.icone} mr-2 fonteHeaderDashboard"></i>
				<h:outputLabel value="#{bean.dashboardTwitter.titulo}" styleClass="fonteHeaderDashboard" />
				<p:commandLink action="#{bean.persistirDashboard(bean.dashboardTwitter)}" rendered="#{!bean.dashboardTwitter.maximizado}" styleClass="float-right p-0" update="panelGeral">
					<i class="fas fa-angle-down text-center fonteHeaderDashboard" />
					<f:setPropertyActionListener value="true" target="#{bean.dashboardTwitter.maximizado}"></f:setPropertyActionListener>
				</p:commandLink>
				<p:commandLink action="#{bean.persistirDashboard(bean.dashboardTwitter)}" rendered="#{bean.dashboardTwitter.maximizado}" styleClass="float-right p-0" update="panelGeral">
					<i class="fas fa-angle-up text-center fonteHeaderDashboard " />
					<f:setPropertyActionListener value="false" target="#{bean.dashboardTwitter.maximizado}"></f:setPropertyActionListener>
				</p:commandLink>
				<p:commandLink id="ocultarTwitter" action="#{bean.persistirDashboard(bean.dashboardTwitter)}" update=":menuTopo, :panelGeral" styleClass="border-0 bg-transparent float-right p-0" title="Ocultar Gráfico">
					<i class="fas fa-compress-arrows-alt text-center fonteHeaderDashboard" />
					<f:setPropertyActionListener value="true" target="#{bean.dashboardTwitter.ocultar}"></f:setPropertyActionListener>
				</p:commandLink>
			</ui:define>
			<ui:define name="body">
				<div id="twitter" class="w-100 p-2 scroller-x">
					<h:outputText value="#{LoginControle.configuracaoGeralSistemaVO.codigoTwitts}" escape="false" />
				</div>
			</ui:define>
		</otm2:dashpanel>
	</h:panelGroup>
</composite:implementation>
</html>
