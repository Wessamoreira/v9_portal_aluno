<ui:composition xmlns="http://www.w3.org/1999/xhtml"
				xmlns:p="http://primefaces.org/ui"

				xmlns:otm="http://java.sun.com/jsf/composite/otm"
				xmlns:otm2="http://www.otimize-ti.com.br">

	<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado100" id="panelIdentificacaoEstudantil" widgetVar="panelIdentificacaoEstudantil" zindex="2000" width="750" height="500" >
		<f:facet name="header">
			<h:panelGroup>
				<h:outputText value="Identificação Estudantil" />
			</h:panelGroup>
		</f:facet>

		<h:form prependId="false" id="formIdentificacaoEstudantil">
			<h:panelGroup layout="block" rendered="#{!empty VisaoAlunoControle.urlIdentificacaoEstudantil}" styleClass="col-md-12 text-center">
				<otm:pdfView zoom="#{VisaoAlunoControle.appMovel ? 100 : 200}" scrollbar="0" statusbar="0" toolbar="1" data="#{VisaoAlunoControle.urlIdentificacaoEstudantil}"  />
			</h:panelGroup>
		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
	</p:dialog>


	<otm2:modalCapturarImagemWebCam bean="#{VisaoAlunoControle}" id="modalCapturarImagemWebCamFotoUsuario" />
	<otm2:modalImagemFotoUsuario bean="#{VisaoAlunoControle}" id="panelImagem" panelWebCam="modalCapturarImagemWebCamFotoUsuario" visaoAluno="true" form="formTopoVisao formSelecionarPessoaAlteraFoto" />

	<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado" id="alterarSenha" widgetVar="alterarSenha" width="650" height="300" onShow="javascript:verifica('senha')">
		<f:facet name="header">
			<h:panelGroup>
				<h:outputText value="Alterar Senha"></h:outputText>
			</h:panelGroup>
		</f:facet>
		<h:form prependId="false" id="formAlterarSenha">
			<h:panelGroup layout="block" styleClass="row">
				<h:panelGroup layout="block" styleClass="col-md-3 ">
					<h:outputText styleClass="field control-label tituloCampos" value="Usuário Atual" />
					<h:inputText styleClass="form-control camposObrigatorios" size="20" maxlength="50" value="#{VisaoAlunoControle.loginAnterior}" />
				</h:panelGroup>

				<h:panelGroup layout="block" styleClass="col-md-3 ">
					<h:outputText styleClass="field control-label tituloCampos" value="Senha Atual" />
					<h:inputSecret styleClass="form-control camposObrigatorios" size="20" maxlength="50" value="#{VisaoAlunoControle.senhaAnterior}" />
				</h:panelGroup>
			</h:panelGroup>

			<h:panelGroup layout="block" styleClass="row">
				<h:panelGroup layout="block" styleClass="col-md-3 ">
					<h:outputText styleClass="field control-label tituloCampos" value="Usuário Novo" />
					<h:inputText styleClass="form-control camposObrigatorios" size="20" maxlength="50" disabled="#{VisaoAlunoControle.permitirAlterarUsername}" value="#{VisaoAlunoControle.login}" />
				</h:panelGroup>

				<h:panelGroup layout="block" styleClass="col-md-3 ">
					<h:outputText styleClass="field control-label tituloCampos" value="Senha Nova" />
					<h:inputSecret id="senha" styleClass="form-control camposObrigatorios" size="20" maxlength="50" value="#{VisaoAlunoControle.senha}" onkeyup="javascript:verifica('senha')" />
				</h:panelGroup>

				<h:panelGroup layout="block" styleClass="col-md-2 ">
					<otm:spacer width="100%" />
					<h:outputText styleClass="field control-label tituloCampos" value="Nível Segurança" />
					<div id="page-wrap"></div>
				</h:panelGroup>
			</h:panelGroup>
			<h:panelGroup layout="block" styleClass="row" rendered="#{VisaoAlunoControle.existeConfiguracaoSeiGsuite}">
				<h:panelGroup layout="block" styleClass="col-md-12 ">
					<h:outputText styleClass="field control-label tituloCampos" value="Alterar Senha Conta Gsuite" />
					<h:panelGroup layout="block" styleClass="col-md-12 ">
						<otm:selectBooleanCheckbox id="alterarSenhaContaGsuite" value="#{VisaoAlunoControle.alterarSenhaContaGsuite}" rendered="#{VisaoAlunoControle.existeConfiguracaoSeiGsuite}" />
					</h:panelGroup>
				</h:panelGroup>
			</h:panelGroup>

			<otm:mensagem bean="#{VisaoAlunoControle}"></otm:mensagem>
			<h:panelGroup layout="block" styleClass="row" style="margin-top: 15px">
				<h:panelGroup layout="block" styleClass="col-md-12 text-center">
					<otm:commandButton styleClass="btn btn-dark btn-gravar" oncomplete="PF('alterarSenha').hide()" icon="#{msg_botoes.btn_icon_gravar_embutido}" update="form, formAlterarSenha" action="#{VisaoAlunoControle.alterarSenha}" value="Alterar Senha" />
				</h:panelGroup>
			</h:panelGroup>

		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
	</p:dialog>

	<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado50" id="popupGeracaoArquivoAcessoDados" widgetVar="popupGeracaoArquivoAcessoDados">
		<f:facet name="header">
			<h:outputText value="Geração de Arquivo Acesso a Dados" />
		</f:facet>
		<h:form prependId="false" id="formPanelGeracaoArquivoAcessoDados">
			<h:outputText value="#{msg.msg_geracaoArquivoLGPD}" />
			<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-50">
				<otm:commandButton id="gerar" value="#{msg_botoes.btn_gerarArquivo}" action="#{OcorrenciaLGPDControle.realizarGeracaoTextoPadraoLGPD}" oncomplete="#{OcorrenciaLGPDControle.download}" tooltip="Gerar Arquivo Acesso a Dados" styleClass="btn btn-info btn-novo" update="formPanelGeracaoArquivoAcessoDados" icon="far fa-file-alt" />
				<h:outputText value=" " />
				<otm:commandButton id="fechar" value="#{msg_botoes.btn_fechar}" oncomplete="PF('popupGeracaoArquivoAcessoDados').hide()" tooltip="Fechar" styleClass="btn btn-primary dark btn-fechar" icon="fas fa-times" />
			</h:panelGroup>
		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
	</p:dialog>

	<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado50" id="panelSelecionarPessoaAlteraFoto" widgetVar="panelSelecionarPessoaAlteraFoto">
		<f:facet name="header">
			<h:outputText value="Selecione uma Pessoa Para a Troca da Foto" />
		</f:facet>
		<h:form prependId="false" id="formSelecionarPessoaAlteraFoto" >
			<ui:repeat id="listaPessoaAlterarImagem" value="#{VisaoAlunoControle.listaPessoaAlterarImagem}" var="itens">
				<h:panelGroup layout="block" styleClass="row mn mb10 p5 border rounded-top bg-white">
					<h:panelGroup layout="block" styleClass="col-md-2 text-center">
						<h:panelGroup layout="block" styleClass="float-left">
							<h:graphicImage id="fotoResponsavel_#{row+1}" style="width:64px; height:64px;border-radius: 50%;" value="#{itens.urlFotoAluno}" rendered="#{itens.urlFotoAluno != ''}" />
							<h:panelGroup rendered="#{itens.urlFotoAluno eq ''}">
								<otm:commandIcon icon="fa fa-user" styleIcon="font-size:64px;color: #CCCCCC  !important;" disabled="true" />
							</h:panelGroup>
						</h:panelGroup>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-9 p10 text-center">
						<h:panelGroup layout="block" styleClass="float-left">
							<otm:spacer width="100%"/>
							<h:outputText styleClass="tituloCampos" value="#{itens.nome}" style="font-size: 15px !important" />
						</h:panelGroup>
					</h:panelGroup>
					<h:panelGroup layout="block" styleClass="col-md-1">
						<h:panelGroup layout="block" styleClass="float-right">
							<otm:spacer width="100%" />
							<otm:commandIcon tooltip="Selecionar" icon="#{msg_botoes.btn_icon_camera} iconePequeno" action="#{VisaoAlunoControle.selecionarPessoaAlterarFoto}" update="formImagem" oncomplete="Webcam.reset(); PF('panelImagem').show(); PF('panelSelecionarPessoaAlteraFoto').hide();" />
						</h:panelGroup>
					</h:panelGroup>
				</h:panelGroup>
			</ui:repeat>
		<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
	</p:dialog>
	
	<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado" id="panelQRCodeLogin" widgetVar="panelQRCodeLogin" width="400" domElementAttachment="parent" height="410">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="QR Code Login App Aluno" />
				</h:panelGroup>
			</f:facet>
			<h:form prependId="false" id="formQRCodeLogin">
				<h:panelGrid columns="1" style="height:100%;margin: 0 auto;">
					<h:inputText id="qrcodetext" style="display: none;" value="#{VisaoAlunoControle.qrCode}" />
					<div id="qrcode"></div>
					<script type="text/javascript">
						var qrcode = new QRCode(
								document.getElementById("qrcode"),
								{
									text : document
											.getElementById("qrcodetext").value,
									width : 360,
									height : 360,
									colorDark : "#000000",
									colorLight : "#ffffff",
									correctLevel : QRCode.CorrectLevel.H
								});
					</script>
				</h:panelGrid>
			<p:growl escape="false" showDetail="true" showSummary="false"  globalOnly="true" ></p:growl></h:form>
		</p:dialog>

		position: fixed;

}

						<p:ajax execute="@this" listener="#{VisaoAlunoControle.iniciarMontagemFotoResponsavels}" immediate="true" global="false" partialSubmit="true"/>
					</p:commandLink>
					<p:commandLink rendered="#{VisaoAlunoControle.apresentarIdentificacaoEstudantil and VisaoAlunoControle.isApresentarMenusPrimeiroAcesso}" update="formIdentificacaoEstudantil" oncomplete="#{VisaoAlunoControle.oncompleteModal}" action="#{VisaoAlunoControle.realizarGeracaoIdentificacaoEstudantil}">
						<i class="fas fa-address-card  ml-2 mr-2 fs10 fonteTopo" style="line-height: 15px;"></i>						
					</p:commandLink>

						<p:commandLink styleClass="fonteMenu btn-block" rendered="#{LoginControle.permissaoAcessoMenuVO.aluno}" disabled="#{VisaoAlunoControle.nomeTelaAtual eq '/visaoAluno/dadosPessoaisAluno.xhtml'}" id="clink03" action="#{VisaoAlunoControle.editarDadosPessoa}">
							<i class="fas fa-pencil-alt  fonteMenu iconeMenu"></i>
							<span class="fonteMenu">Dados Pessoais</span>
						</p:commandLink>

						<p:commandLink styleClass="fonteMenu btn-block" rendered="#{LoginControle.permissaoAcessoMenuVO.configuracoesAlteracaoSenha and VisaoAlunoControle.isApresentarMenusPrimeiroAcesso}" action="#{VisaoAlunoControle.inicializarMenuSenha}" oncomplete="PF('alterarSenha').show()" update="formAlterarSenha" id="clink03AS2">

							<span class="fonteMenu">Alterar Senha </span>

						</p:commandLink>
						<p:commandLink styleClass="fonteMenu btn-block"  rendered="#{LoginControle.permissaoAcessoMenuVO.configuracoesAlteracaoFoto and VisaoAlunoControle.isApresentarMenusPrimeiroAcesso and VisaoAlunoControle.usuarioLogado.isApresentarVisaoPais}" update="formSelecionarPessoaAlteraFoto" oncomplete="#{VisaoAlunoControle.oncompleteModal}" action="#{VisaoAlunoControle.montarDadosPessoasFotos}">
							<i class="fas fa-camera fonteMenu iconeMenu"></i>
							<span class="fonteMenu">Alterar Foto </span>
							<p:ajax execute="@this" listener="#{VisaoAlunoControle.iniciarMontagemFotoResponsavels}" immediate="true" global="false" partialSubmit="true"/>
						</p:commandLink>
						<p:commandLink styleClass="fonteMenu btn-block" rendered="#{VisaoAlunoControle.apresentarIdentificacaoEstudantil  and VisaoAlunoControle.isApresentarMenusPrimeiroAcesso}" update="formIdentificacaoEstudantil" oncomplete="#{VisaoAlunoControle.oncompleteModal}" action="#{VisaoAlunoControle.realizarGeracaoIdentificacaoEstudantil}">
							<i class="fas fa-address-card fonteMenu iconeMenu"></i>
							<span class="fonteMenu">Identificação Estudantil</span>							
						</p:commandLink>
					</div>
				</h:panelGroup>
			</h:panelGroup>
