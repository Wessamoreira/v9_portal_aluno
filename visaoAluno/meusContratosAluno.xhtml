<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:p="http://primefaces.org/ui" xmlns:h="http://java.sun.com/jsf/html"
 xmlns:f="http://java.sun.com/jsf/core"
 xmlns:ui="http://java.sun.com/jsf/facelets" xmlns:otm="http://java.sun.com/jsf/composite/otm" xmlns:otm2="http://www.otimize-ti.com.br"> <h:head>
</h:head> <ui:composition template="/visaoAluno/template/visaoAluno.xhtml">
	<ui:define name="tituloPagina">
		<h:outputText value="#{msg_aplic.prt_VisaoAlunoContrato}" />
	</ui:define>

	<ui:define name="conteudo">
		<!-- 		<ui:include src="./pPanelImagem.xhtml" /> -->

		<p:dialog modal="true" hideEffect="fade" closeOnEscape="true" showEffect="fade" styleClass="modalMaximizado" id="panelDocumentoContratoAssinado" widgetVar="panelDocumentoContratoAssinado" width="800" height="600">
			<f:facet name="header">
				<h:panelGroup>
					<h:outputText value="Documento Assinado"></h:outputText>
				</h:panelGroup>
			</f:facet>
			<h:form id="formDocumentoContratoAssinado">
				<h:panelGroup layout="block" styleClass="row mn">
					<ui:repeat id="documentoAssinado" value="#{VisaoAlunoControle.documentoAssinado.listaDocumentoAssinadoPessoa}" rendered="#{!empty VisaoAlunoControle.documentoAssinado.listaDocumentoAssinadoPessoa}" rows="10" var="documentoAssinadoItens">
						<h:panelGroup layout="block" styleClass="col-md-12 border-bottom mb5 pb5">
							<h:panelGroup style="right: 80%; right: 79%; top: 5%;" rendered="#{documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'REJEITADO' or documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'PENDENTE'}">
								<i class="fas fa-exclamation-triangle mr5" style="color: #ffd700;font-size: 16px;#{documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'REJEITADO' or documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'PENDENTE' ? '' : 'display: none;'}" />
							</h:panelGroup>
							<h:panelGroup style="right: 80%; right: 79%; top: 5%;" rendered="#{!(documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'REJEITADO' or documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'PENDENTE')}">
								<i class="fas fa-exclamation-triangle mr5 text-success" style="font-size: 16px;" />
							</h:panelGroup>
							<h:outputText style="font-weight: bold;" value="Contrato rejeitado por #{documentoAssinadoItens.pessoaVO.nome} e motivo #{documentoAssinadoItens.motivoRejeicao}." rendered="#{documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'REJEITADO'}" />
							<h:outputText style="font-weight: bold;" value="Contrato Aguardando Assinatura de #{documentoAssinadoItens.pessoaVO.nome}." rendered="#{documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'PENDENTE'}" />
							<h:outputText style="font-weight: bold;" value="Contrato Assinado por #{documentoAssinadoItens.pessoaVO.nome}." rendered="#{documentoAssinadoItens.situacaoDocumentoAssinadoPessoaEnum eq 'ASSINADO'}" />
						</h:panelGroup>
					</ui:repeat>
				</h:panelGroup>
				<h:panelGroup layout="block" style="width:99%">
					<otm2:pdfView2 bean="#{VisaoAlunoControle}" toolbar="1" id="pdfView" data="#{VisaoAlunoControle.caminhoPreviewContrato}" width="100%" height="450px" />
				</h:panelGroup>
				<h:panelGroup layout="block" styleClass="barra-btn-flutuante-modal-80">
					<p:commandLink id="fecharModal" styleClass="btn btn-danger" value="Fechar" tooltip="Fechar" update="formDocumentoContratoAssinado" oncomplete="PF('panelDocumentoContratoAssinado').hide();">
						<span class="#{msg_botoes.btn_icon_fechar_embutido} pull-left" style="margin-right: 0.8em; position: relative; top: 1px; font-size: 14px;" />
					</p:commandLink>
				</h:panelGroup>
				<p:growl escape="false" showDetail="true" showSummary="false" globalOnly="true"></p:growl>
			</h:form>
		</p:dialog>
		
		<h:form id="form">
		    <h:panelGroup id="contratos" layout="block" styleClass="row"> 
		        <p:dataTable id="textoPadrao" headerClass="consulta" style="background-color: transparent; width: 100%;" columnClasses="colunaAlinhamento" value="#{VisaoAlunoControle.matriculaPeriodoContratoVOs}" var="matriculaPeriodoContratoVOItens">
		            <!-- Cabeçalhos das Colunas -->
		            <f:facet name="header">
		            <h:panelGroup layout="block" styleClass="col-md-12">
		            <h:panelGroup layout="block" styleClass="col-md-1">
		                <p:column style="text-align: center !important">
		                    <h:outputText value="Ano/Semestre" />
		                </p:column>
		                </h:panelGroup>
		                <h:panelGroup layout="block" styleClass="col-md-6">
		                <p:column style="text-align: center !important">
		                    <h:outputText value="Descrição" />
		                </p:column>
		                </h:panelGroup>
		                <h:panelGroup layout="block" styleClass="col-md-4">
		                <p:column style="text-align: center !important">
		                    <h:outputText value="Tipo" />
		                </p:column>
		                 </h:panelGroup>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="Opções" />
		                </p:column>
		               </h:panelGroup>
		            </f:facet>
		
		            <!-- Linha para o Contrato de Matrícula -->
		            <p:columnGroup>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoMatricula.descricao}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo_Apresentar}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <otm:commandIcon id="imprimirMatricula" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Matrícula" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" render="form,formDocumentoContratoAssinado" />
		                </p:column>
		            </p:columnGroup>
		
		            <!-- Linha para o Contrato de Fiador -->
		            <p:columnGroup>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoFiador.descricao}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo_Apresentar}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <otm:commandIcon id="imprimirFiador" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Fiador" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" render="form,formDocumentoContratoAssinado" />
		                </p:column>
		            </p:columnGroup>
		
		            <!-- Linha para o Contrato de Extensão -->
		            <p:columnGroup>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoExtensao.descricao}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoExtensao.tipo_Apresentar}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <otm:commandIcon id="imprimirExtensao" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Extensão" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" render="form,formDocumentoContratoAssinado"/>
		                </p:column>
		            </p:columnGroup>
		            <!-- Linha para o Contrato Aditivo -->
		            <p:columnGroup>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoAditivo.descricao}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <h:outputText value="#{matriculaPeriodoContratoVOItens.contratoAditivo.tipo_Apresentar}" />
		                </p:column>
		                <p:column style="text-align: center !important">
		                    <otm:commandIcon id="imprimirAditivo" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Aditivo" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" render="form,formDocumentoContratoAssinado" />
		                </p:column>
		            </p:columnGroup>
		
		        </p:dataTable>
		    </h:panelGroup>
	</h:form>
			

		<h:form prependId="false" id="form">
			<h:panelGroup id="contratos" layout="block" styleClass="row">
				<p:dataTable paginator="true" paginatorPosition="bottom" paginatorAlwaysVisible="false" id="textoPadrao" headerClass="consulta" style="background-color: transparent; width: 100%;" value="#{VisaoAlunoControle.matriculaPeriodoContratoVOs}" var="matriculaPeriodoContratoVOItens">
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="Ano/Semestre" />
						</f:facet>
						<h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" rendered="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo == 'MA'}" />
						<h:outputText value="#{matriculaPeriodoContratoVOItens.ano} / #{matriculaPeriodoContratoVOItens.semestre}" rendered="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo == 'FI'}" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_ContratosReceitas_descricao}" />
						</f:facet>
						<h:outputText value="#{matriculaPeriodoContratoVOItens.contratoMatricula.descricao}" rendered="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo == 'MA'}" />
						<h:outputText value="#{matriculaPeriodoContratoVOItens.contratoFiador.descricao}" rendered="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo == 'FI'}" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_TextoPadrao_tipo}" />
						</f:facet>
						<h:outputText value="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo_Apresentar}" rendered="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo == 'MA'}" />
						<h:outputText value="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo_Apresentar}" rendered="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo == 'FI'}" />
					</p:column>
					<p:column style="text-align: center !important">
						<f:facet name="header">
							<h:outputText value="#{msg_aplic.prt_Requerimento_opcoes}" />
						</f:facet>
						<otm:commandIcon id="imprimirMatricula" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Matrícula" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" rendered="#{matriculaPeriodoContratoVOItens.contratoMatricula.tipo == 'MA'}" update="form,formDocumentoContratoAssinado" />
						<otm:commandIcon id="imprimirFiador" title="#{msg_aplic.prt_imprimirContrato}" tooltip="Contrato Fiador" action="#{VisaoAlunoControle.imprimirContrato}" oncomplete="#{VisaoAlunoControle.downloadContrato}" icon="#{msg_botoes.btn_icon_pdf} iconePequeno" rendered="#{matriculaPeriodoContratoVOItens.contratoFiador.tipo == 'FI'}" />
					</p:column>
				</p:dataTable>
			</h:panelGroup>
			<p:growl escape="false" showDetail="true" showSummary="false" globalOnly="true"></p:growl>
		</h:form>
	</ui:define>
</ui:composition> </html>
