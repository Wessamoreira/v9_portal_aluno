.inputLogin-redefinir {

	padding-left: 16px !important;

	text-align: center !important;
	width: 100% !important;

	background-color: transparent !important;

	background: transparent !important;
	background-image: none !important;
	background-color: transparent !important;
	border-radius: 5px;
}

.form-control-perfil {
	display: block;
	width: 100%;
	height: calc(1.5em + 0.9rem + 2px);
	padding: 0.45rem 0.9rem;
	font-size: 12px;
	font-weight: 400;
	line-height: 1.5;
	color: #6c757d;
	background-color: #fff;
	background-clip: padding-box;
	border: 1px solid #ced4da;
	border-radius: 0.5rem;
	transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
}

.btn-entrar {
	display: block;
	width: 100%;
	text-decoration: none !important;
	font-size: 1.4rem  !important;
	line-height: 40px;
	float: right;
	text-align: right;
}

.panelPerfil {
	min-width: 301px !important;
	left: 35% !important;
	width: 40% !important;
	height: 55% !important;
	overflow: auto;
}

.strike {
	display: block;
	text-align: center;
	overflow: hidden;
	white-space: nowrap;
}

.strike>span {
	position: relative;
	display: inline-block;
	color: white !important;
	font-weight: bold;
}

.strike>span:before, .strike>span:after {
	content: "";
	position: absolute;
	top: 50%;
	width: 9999px;
	height: 2px;
	background: white !important;
}

.strike>span:before {
	right: 100%;
	margin-right: 15px;
}

.bx-wrapper {
	border: none !important;
	background: transparent !important;
}

.strike>span:after {
	left: 100%;
	margin-left: 15px;
}

.panelDadosLogin {
	height: 358px;
	padding: 15px;
}

.esqueciSenha {
	border-bottom: solid 1px;
	position: relative;
	top: 4px;
	font-size: 12px;
}

.homeCandidato {
	border-bottom: solid 1px;
	position: relative;
	top: 4px;
	font-size: 12px;
}
.panel-login{
	display: block;
	text-align: right;
}

        margin-top: 50px !important;
        text-align: center !important;
	}
	.panel-login .pull-right {
		float: unset !important;
	}
}

			(function($) {
acionarBotaoPelaTeclaEnter =  function(event, id){
					code = (event.keyCode ? event.keyCode: event.which);					
					if (code == 13 || (event.target.type == '' &amp;&amp; code == 32)) {
						event.preventDefault();					
						document.getElementById(id).click();
					}
				};
				
				validarEnconding = function(){
					$('input,textarea').on('blur', function(){
			    		if($(this).val() != 'indefined' &amp;&amp; $(this).val() != ''){
			    			var length = $(this).val().length;
			    			var valorFinal = "";
			    			var texto = $(this).val();
			    			 for (var i = 0; i &lt; length; i++) {
			    				   var code = texto.charCodeAt(i);			    				   
			    				   if(code &lt;= 255){
			    					   valorFinal += texto.substring(i, i+1);
			    				   }else{
			    					   valorFinal += " ";
			    				   }
			    			}
			    			 $(this).val(valorFinal);			    			 
			    		}
			    	});
				}
				
			})(jQuery);
			</script>
